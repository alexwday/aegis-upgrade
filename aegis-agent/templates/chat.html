<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Functions Assist</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f8fb;
        --panel: #ffffff;
        --text: #17202a;
        --muted: #64748b;
        --line: #e1e7ef;
        --line-dark: #17355f;
        --accent: #005daa;
        --accent-dark: #062b60;
        --soft: #eef6ff;
        --soft-2: #f8fafc;
        --danger: #b42318;
        --shadow: 0 18px 46px rgba(15, 23, 42, 0.07);
        --aegis-navy: #062b60;
        --aegis-blue: #005daa;
        --aegis-cyan: #00a6d6;
        --aegis-gold: #fdb515;
        --aegis-ice: #f3f8fd;
        --aegis-line: rgba(0, 93, 170, 0.18);
        --aegis-glow: 0 18px 42px rgba(6, 43, 96, 0.12);
        --generated-surface: linear-gradient(
          135deg,
          rgba(6, 43, 96, 0.98) 0%,
          rgba(0, 93, 170, 0.96) 52%,
          rgba(4, 39, 77, 0.98) 100%
        );
        --generated-line: rgba(255, 255, 255, 0.16);
        --generated-soft: rgba(255, 255, 255, 0.08);
        --generated-soft-strong: rgba(255, 255, 255, 0.14);
        --generated-text: #ffffff;
        --generated-muted: rgba(255, 255, 255, 0.74);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        letter-spacing: 0;
        -webkit-font-smoothing: antialiased;
        text-rendering: geometricPrecision;
      }

      .app {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        height: 100vh;
        max-width: 1120px;
        margin: 0 auto;
        padding: 14px;
      }

      .chat {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        min-height: 0;
        background: var(--panel);
        border: 1px solid rgba(15, 23, 42, 0.08);
        border-radius: 10px;
        box-shadow: var(--shadow);
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding: 12px 16px;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.82);
      }

      .brand {
        display: flex;
        flex-direction: column;
        gap: 1px;
      }

      .brand h1 {
        margin: 0;
        color: var(--aegis-navy);
        font-size: 16px;
        font-weight: 760;
        line-height: 1.15;
      }

      .brand span,
      .connection {
        color: var(--muted);
        font-size: 11px;
        font-weight: 650;
      }

      .connection {
        padding: 4px 8px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--soft-2);
        white-space: nowrap;
      }

      .messages {
        overflow-y: auto;
        padding: 16px 18px;
      }

      .message {
        display: grid;
        gap: 6px;
        max-width: 860px;
        margin-bottom: 14px;
      }

      .message.user {
        margin-left: auto;
        justify-items: end;
      }

      .message-label {
        color: var(--muted);
        font-size: 10px;
        font-weight: 750;
        text-transform: uppercase;
      }

      .bubble {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px 12px;
        line-height: 1.45;
        font-size: 13px;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }

      .message.user .bubble {
        background: var(--accent);
        border-color: var(--accent);
        color: #ffffff;
      }

      .message.error .bubble {
        background: #fff4f2;
        border-color: #ffd6d1;
        color: var(--danger);
      }

      .assistant-turn {
        display: grid;
        gap: 9px;
        max-width: 880px;
        margin: 0 0 16px;
      }

      .response-frame {
        display: grid;
        gap: 9px;
        padding: 10px;
        border: 1px solid rgba(0, 93, 170, 0.12);
        border-radius: 10px;
        background: linear-gradient(180deg, #ffffff 0%, #fbfcfb 100%);
      }

      .status-panel {
        position: relative;
        overflow: hidden;
        border: 1px solid var(--generated-line);
        border-radius: 7px;
        background: var(--generated-surface);
        box-shadow: var(--aegis-glow);
        isolation: isolate;
      }

      .status-panel.hidden {
        display: none;
      }

      .status-panel.complete {
        border-color: var(--generated-line);
        background: var(--generated-surface);
      }

      .status-panel.complete::before {
        display: none;
      }

      .status-panel::before {
        content: "";
        position: absolute;
        inset: -80px;
        z-index: -1;
        background: conic-gradient(
          from 0deg,
          rgba(255, 255, 255, 0),
          rgba(255, 255, 255, 0),
          rgba(0, 166, 214, 0.9),
          rgba(253, 181, 21, 0.45),
          rgba(255, 255, 255, 0)
        );
        animation: border-sweep 1.8s linear infinite;
      }

      .status-panel::after {
        content: "";
        position: absolute;
        inset: 2px;
        z-index: -1;
        border-radius: 6px;
        background: var(--generated-surface);
      }

      @keyframes border-sweep {
        to {
          transform: rotate(360deg);
        }
      }

      .status-toggle {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        align-items: center;
        gap: 8px;
        width: 100%;
        min-height: 32px;
        padding: 6px 9px;
        border: 0;
        background: transparent;
        color: var(--generated-text);
        text-align: left;
      }

      .loader {
        position: relative;
        width: 14px;
        height: 14px;
        border: 2px solid rgba(255, 255, 255, 0.2);
        border-top-color: var(--aegis-cyan);
        border-radius: 999px;
        animation: spin 0.85s linear infinite;
      }

      .status-panel.complete .loader {
        width: 8px;
        height: 8px;
        background: var(--aegis-cyan);
        border-color: var(--aegis-cyan);
        animation: none;
      }

      .status-panel.complete .loader::after {
        display: none;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .status-text {
        min-width: 0;
        color: var(--generated-text);
        font-size: 11px;
        font-weight: 750;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .status-count {
        color: var(--generated-muted);
        font-size: 10px;
        font-weight: 650;
        white-space: nowrap;
      }

      .status-timeline {
        display: grid;
        gap: 7px;
        max-height: 160px;
        overflow-y: auto;
        padding: 0 10px 10px 32px;
      }

      .status-panel:not(.collapsed) .status-timeline {
        border-top: 1px solid var(--generated-line);
        padding-top: 9px;
      }

      .status-panel.collapsed .status-timeline {
        display: none;
      }

      .status-row {
        display: grid;
        gap: 2px;
        color: var(--generated-muted);
        font-size: 11px;
        line-height: 1.35;
      }

      .status-row strong {
        color: var(--generated-text);
        font-size: 11px;
        text-transform: uppercase;
      }

      .main-response {
        min-height: 56px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
        padding: 12px 13px;
        line-height: 1.5;
        font-size: 13.5px;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }

      .main-response.pending {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr);
        align-items: center;
        gap: 8px;
        color: var(--muted);
        background: var(--soft-2);
      }

      .main-response.pending::before {
        content: "";
        width: 7px;
        height: 7px;
        border-radius: 999px;
        background: var(--accent);
      }

      .main-response.status-feed {
        display: block;
        border-color: var(--generated-line);
        color: var(--generated-text);
        background: var(--generated-surface);
        box-shadow: var(--aegis-glow);
      }

      .main-response.status-feed::before {
        display: none;
      }

      .progress-log {
        display: grid;
        gap: 7px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .progress-entry {
        display: grid;
        gap: 2px;
        padding-left: 15px;
        position: relative;
        color: var(--generated-muted);
        font-size: 12px;
        line-height: 1.4;
      }

      .progress-entry::before {
        content: "";
        position: absolute;
        top: 0.62em;
        left: 0;
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background: var(--accent);
      }

      .progress-entry strong {
        color: var(--generated-text);
        font-size: 11px;
        text-transform: uppercase;
      }

      .research-status-board {
        display: grid;
        gap: 6px;
      }

      .research-status-head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
      }

      .research-status-title {
        color: var(--generated-text);
        font-size: 11px;
        font-weight: 850;
        text-transform: uppercase;
      }

      .research-status-updated {
        color: var(--generated-muted);
        font-size: 10px;
        font-weight: 650;
        white-space: nowrap;
      }

      .research-source-dot {
        display: inline-block;
        flex: 0 0 auto;
        width: 7px;
        height: 7px;
        border-radius: 999px;
        background: var(--generated-muted);
      }

      .research-status-row.checking .research-source-dot,
      .research-status-row.in_progress .research-source-dot,
      .research-status-row.incomplete .research-source-dot {
        background: var(--aegis-gold);
      }

      .research-status-row.complete .research-source-dot,
      .research-status-row.partial .research-source-dot {
        background: var(--aegis-cyan);
      }

      .research-status-row.error .research-source-dot {
        background: #ffb4a9;
      }

      .research-status-table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
        border: 1px solid var(--generated-line);
        border-radius: 8px;
        overflow: hidden;
        background: var(--generated-soft);
      }

      .research-status-table th,
      .research-status-table td {
        padding: 6px 8px;
        border-bottom: 1px solid var(--generated-line);
        color: var(--generated-muted);
        font-size: 10.5px;
        line-height: 1.35;
        text-align: left;
        vertical-align: top;
        white-space: normal;
        overflow-wrap: anywhere;
      }

      .research-status-table th {
        background: var(--generated-soft-strong);
        color: var(--generated-text);
        font-size: 9px;
        font-weight: 850;
        text-transform: uppercase;
      }

      .research-status-table tr:last-child td {
        border-bottom: 0;
      }

      .research-status-table .source-col {
        width: 22%;
      }

      .research-status-table .status-col {
        width: 20%;
      }

      .research-status-source {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-width: 0;
        max-width: 100%;
      }

      .research-source-name {
        min-width: 0;
        color: var(--generated-text);
        font-size: 10px;
        font-weight: 820;
        line-height: 1.3;
      }

      .research-source-status {
        color: var(--generated-text);
        font-size: 10px;
        font-weight: 780;
        text-transform: uppercase;
      }

      .research-summary-body {
        color: var(--generated-muted);
        font-size: 10.5px;
        line-height: 1.35;
      }

      .research-summary-empty {
        color: var(--generated-muted);
        font-size: 10.5px;
        line-height: 1.3;
      }

      .main-response.empty {
        display: none;
      }

      .main-response.document {
        padding: 14px;
        line-height: 1.55;
        white-space: normal;
      }

      .main-response.document h1,
      .main-response.document h2,
      .main-response.document h3 {
        margin: 8px 0 2px;
        line-height: 1.25;
      }

      .main-response.document h1 {
        font-size: 19px;
      }

      .main-response.document h2 {
        font-size: 16px;
      }

      .main-response.document h3 {
        font-size: 13px;
      }

      .main-response.polished {
        padding: 0;
        border: 0;
        background: transparent;
        white-space: normal;
      }

      .research-answer {
        display: grid;
        gap: 9px;
      }

      .answer-hero,
      .metric-card {
        border: 1px solid var(--aegis-line);
        border-radius: 9px;
        background: #ffffff;
      }

      .answer-hero {
        position: relative;
        display: grid;
        gap: 9px;
        overflow: hidden;
        padding: 15px 16px;
        color: #ffffff;
        border-color: rgba(255, 255, 255, 0.16);
        background: var(--generated-surface);
        box-shadow: var(--aegis-glow);
        isolation: isolate;
      }

      .answer-hero::before {
        content: "";
        position: absolute;
        inset: -42% -28% -58% -24%;
        z-index: -1;
        background:
          radial-gradient(82% 66% at 98% 3%, transparent 44%, rgba(0, 166, 214, 0.58) 45%, transparent 46.4%, transparent 53%, rgba(253, 181, 21, 0.44) 54%, transparent 55.3%, transparent 62%, rgba(255, 255, 255, 0.28) 63%, transparent 64.2%),
          radial-gradient(90% 76% at 104% 1%, transparent 51%, rgba(82, 207, 255, 0.32) 52%, transparent 53.1%),
          linear-gradient(145deg, transparent 0%, rgba(255, 255, 255, 0.08) 42%, transparent 66%);
        opacity: 0.92;
        transform: rotate(-7deg);
      }

      .answer-hero::after {
        content: "";
        position: absolute;
        right: -12%;
        bottom: -58%;
        z-index: -1;
        width: 58%;
        height: 130%;
        background: radial-gradient(circle, rgba(253, 181, 21, 0.22), transparent 62%);
      }

      .answer-hero > * {
        position: relative;
      }

      .answer-eyebrow {
        color: rgba(255, 255, 255, 0.74);
        font-size: 10px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .answer-headline {
        margin: 0;
        color: #ffffff;
        font-size: 18px;
        line-height: 1.22;
        font-weight: 780;
        max-width: 760px;
      }

      .answer-dek {
        margin: 0;
        max-width: 760px;
        color: rgba(255, 255, 255, 0.78);
        font-size: 12px;
        line-height: 1.45;
      }

      .citation-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-height: 23px;
        border-radius: 999px;
        font-size: 10.5px;
        font-weight: 750;
        line-height: 1;
      }

      .metric-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
      }

      .metric-card {
        position: relative;
        display: grid;
        gap: 6px;
        min-height: 78px;
        padding: 10px;
        overflow: hidden;
        border-color: rgba(0, 166, 214, 0.22);
        background: linear-gradient(180deg, #f4fbff 0%, #e8f4fb 100%);
        box-shadow: 0 14px 34px rgba(6, 43, 96, 0.1);
      }

      .metric-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, var(--aegis-cyan), var(--aegis-gold));
      }

      .metric-card::after {
        display: none;
      }

      .metric-label {
        position: relative;
        color: #47708b;
        font-size: 9.5px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .metric-value {
        position: relative;
        color: var(--aegis-navy);
        font-size: 19px;
        font-weight: 800;
        line-height: 1;
      }

      .metric-context {
        position: relative;
        color: #5b7285;
        font-size: 11px;
        line-height: 1.32;
      }

      .answer-section {
        padding: 2px 1px;
      }

      .final-body {
        color: var(--text);
        font-size: 13.5px;
        line-height: 1.52;
      }

      .final-body.drafting {
        display: grid;
        align-items: center;
        min-height: 40px;
      }

      .final-body.drafting::before {
        content: "";
        display: block;
        width: min(360px, 72%);
        height: 10px;
        border-radius: 999px;
        background: linear-gradient(90deg, #eef3f8 0%, #dfeaf5 42%, #eef3f8 84%);
        background-size: 220% 100%;
        animation: draft-pulse 1.15s ease-in-out infinite;
      }

      @keyframes draft-pulse {
        to {
          background-position: -220% 0;
        }
      }

      .final-body.body-only {
        min-height: 56px;
      }

      .final-body h1,
      .final-body h2,
      .final-body h3 {
        margin: 9px 0 3px;
        line-height: 1.25;
      }

      .final-body h1 {
        font-size: 18px;
      }

      .final-body h2 {
        font-size: 15.5px;
      }

      .final-body h3 {
        font-size: 13px;
      }

      .final-body ul,
      .evidence-content ul {
        display: grid;
        gap: 6px;
        margin: 7px 0;
        padding-left: 18px;
      }

      .final-body li,
      .evidence-content li {
        padding-left: 2px;
      }

      .research-table-wrap {
        margin: 8px 0 10px;
        overflow-x: auto;
        max-width: 100%;
        scrollbar-gutter: stable;
        scrollbar-width: thin;
        overscroll-behavior-x: contain;
        -webkit-overflow-scrolling: touch;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
      }

      .research-table {
        width: max(100%, var(--table-min-width, 420px));
        min-width: var(--table-min-width, 420px);
        border-collapse: collapse;
        table-layout: fixed;
        font-size: 12px;
        line-height: 1.35;
        white-space: normal;
      }

      .research-table th,
      .research-table td {
        padding: 7px 9px;
        border-bottom: 1px solid var(--line);
        text-align: left;
        vertical-align: top;
        overflow-wrap: break-word;
        word-break: normal;
      }

      .research-table th {
        background: #f5f8fb;
        color: var(--muted);
        font-size: 10px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .research-table tr:last-child td {
        border-bottom: 0;
      }

      .chart-card {
        position: relative;
        display: grid;
        gap: 8px;
        margin: 10px 0 12px;
        overflow: hidden;
        color: var(--generated-text);
        border: 1px solid var(--generated-line);
        border-radius: 9px;
        background: var(--generated-surface);
        box-shadow: var(--aegis-glow);
        isolation: isolate;
      }

      .chart-card::before {
        content: "";
        position: absolute;
        inset: -62% -30% auto auto;
        z-index: -1;
        width: 68%;
        height: 180%;
        background:
          radial-gradient(circle at 50% 50%, rgba(0, 166, 214, 0.35), transparent 56%),
          radial-gradient(circle at 70% 64%, rgba(253, 181, 21, 0.22), transparent 52%);
        transform: rotate(-12deg);
      }

      .chart-card.pending {
        min-height: 220px;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.03), rgba(0, 166, 214, 0.12), rgba(255, 255, 255, 0.03)),
          var(--generated-surface);
        background-size: 220% 100%;
        animation: draft-pulse 1.15s ease-in-out infinite;
      }

      .chart-card.error {
        border-color: rgba(255, 180, 169, 0.48);
      }

      .chart-head {
        display: grid;
        gap: 3px;
        padding: 11px 12px 0;
      }

      .chart-title {
        color: var(--generated-text);
        font-size: 13px;
        line-height: 1.25;
        font-weight: 820;
      }

      .chart-subtitle {
        color: var(--generated-muted);
        font-size: 10.5px;
        line-height: 1.35;
        font-weight: 650;
      }

      .chart-frame {
        position: relative;
        min-height: 220px;
        padding: 0 12px 10px;
      }

      .chart-svg {
        display: block;
        width: 100%;
        min-height: 230px;
        border-radius: 7px;
        background: rgba(255, 255, 255, 0.96);
        box-shadow: inset 0 0 0 1px rgba(6, 43, 96, 0.08);
      }

      .chart-grid {
        stroke: rgba(6, 43, 96, 0.12);
        stroke-width: 1;
      }

      .chart-axis-label,
      .chart-tick {
        fill: #64748b;
        font-size: 10px;
        font-weight: 650;
      }

      .chart-value-label {
        fill: var(--aegis-navy);
        font-size: 10px;
        font-weight: 800;
      }

      .chart-bar {
        fill: var(--aegis-cyan);
        stroke: var(--aegis-navy);
        stroke-width: 0.7;
        transition: opacity 0.15s ease, filter 0.15s ease;
      }

      .chart-bar.featured {
        fill: var(--aegis-gold);
      }

      .chart-bar:hover,
      .chart-point:hover,
      .chart-heat-cell:hover {
        filter: brightness(0.94);
        opacity: 0.86;
      }

      .chart-line {
        fill: none;
        stroke: var(--aegis-blue);
        stroke-width: 3;
      }

      .chart-area {
        fill: rgba(0, 166, 214, 0.08);
      }

      .chart-point {
        fill: var(--aegis-gold);
        stroke: var(--aegis-navy);
        stroke-width: 1.4;
      }

      .chart-heat-cell {
        stroke: #ffffff;
        stroke-width: 1.2;
      }

      .chart-placeholder {
        display: grid;
        min-height: 210px;
        align-items: center;
        justify-items: center;
        border: 1px solid var(--generated-line);
        border-radius: 7px;
        color: var(--generated-muted);
        background: var(--generated-soft);
        font-size: 12px;
        font-weight: 700;
      }

      .chart-foot {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 6px;
        padding: 0 12px 11px;
        color: var(--generated-muted);
        font-size: 10.5px;
      }

      .chart-foot .citation-chip {
        border-color: rgba(255, 255, 255, 0.2);
        background: var(--generated-soft-strong);
        color: var(--generated-text);
      }

      .answer-section h3 {
        margin: 3px 0 7px;
        font-size: 13px;
        font-weight: 800;
      }

      .answer-bullets {
        display: grid;
        gap: 7px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .answer-bullets li {
        position: relative;
        padding-left: 15px;
        color: var(--text);
        font-size: 13px;
        line-height: 1.5;
      }

      .answer-bullets li::before {
        content: "";
        position: absolute;
        top: 0.68em;
        left: 0;
        width: 5px;
        height: 5px;
        border-radius: 999px;
        background: var(--accent);
      }

      .citation-row {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        margin-top: 6px;
      }

      .citation-chip {
        padding: 4px 7px;
        border: 1px solid var(--generated-line);
        background: var(--generated-surface);
        color: var(--generated-text);
        box-shadow: 0 5px 12px rgba(6, 43, 96, 0.13);
      }

      a.citation-chip {
        color: var(--generated-text);
        text-decoration: none;
      }

      a.citation-chip:hover {
        border-color: rgba(0, 166, 214, 0.58);
        background: linear-gradient(135deg, rgba(0, 93, 170, 0.98), rgba(4, 39, 77, 0.98));
      }

      .final-body a {
        color: #1b8fd6;
      }

      .final-body a.citation-chip {
        border-color: rgba(0, 166, 214, 0.28);
        background: #e9f7ff;
        color: #1179bd;
        box-shadow: 0 5px 12px rgba(0, 93, 170, 0.1);
      }

      .final-body a.citation-chip:hover {
        border-color: rgba(0, 166, 214, 0.42);
        background: #d8f1ff;
        color: #005daa;
      }

      .evidence-stack {
        display: block;
      }

      .evidence-stack.empty {
        display: none;
      }

      .evidence-panel {
        border: 1px solid var(--generated-line);
        border-radius: 9px;
        color: var(--generated-text);
        background: var(--generated-surface);
        overflow: hidden;
        box-shadow: var(--aegis-glow);
      }

      .evidence-summary {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        width: 100%;
        min-height: 32px;
        padding: 7px 10px;
        border: 0;
        border-radius: 0;
        background: transparent;
        color: var(--generated-text);
        text-align: left;
      }

      .evidence-title {
        color: var(--generated-text);
        font-size: 10px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .evidence-hint {
        color: var(--generated-muted);
        font-size: 10px;
        font-weight: 650;
        white-space: nowrap;
      }

      .evidence-panel.collapsed .evidence-tabs,
      .evidence-panel.collapsed .evidence-content {
        display: none;
      }

      .evidence-tabs {
        display: flex;
        align-items: end;
        flex-wrap: wrap;
        gap: 3px;
        padding: 6px 8px 0;
        border-top: 1px solid var(--generated-line);
        border-bottom: 1px solid var(--generated-line);
        background: var(--generated-soft);
      }

      .evidence-tab {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        width: auto;
        min-height: 27px;
        margin-bottom: -1px;
        padding: 5px 9px;
        border: 1px solid var(--generated-line);
        border-bottom-color: var(--generated-line);
        border-radius: 6px 6px 0 0;
        background: var(--generated-soft);
        color: var(--generated-muted);
        font-size: 11px;
        font-weight: 750;
        white-space: nowrap;
      }

      .evidence-tab::before {
        display: none;
      }

      .evidence-tab[aria-expanded="true"] {
        background: var(--generated-soft-strong);
        border-color: rgba(255, 255, 255, 0.24);
        border-bottom-color: transparent;
        color: var(--generated-text);
      }

      .evidence-content {
        border-top: 1px solid var(--generated-line);
        max-height: 320px;
        overflow-y: auto;
        padding: 10px;
        font-size: 12px;
        line-height: 1.5;
        color: rgba(255, 255, 255, 0.84);
        background: rgba(4, 39, 77, 0.66);
      }

      .evidence-content.empty {
        display: none;
      }

      .evidence-content h3 {
        color: var(--generated-text);
        margin: 8px 0 6px;
        font-size: 13px;
      }

      .evidence-content strong {
        color: var(--generated-text);
      }

      .evidence-content .citation-chip {
        background: var(--generated-soft-strong);
      }

      .evidence-content .research-table-wrap {
        border-color: var(--generated-line);
        background: var(--generated-soft);
      }

      .evidence-content .research-table {
        color: var(--generated-text);
      }

      .evidence-content .research-table th,
      .evidence-content .research-table td {
        border-bottom-color: var(--generated-line);
      }

      .evidence-content .research-table th {
        background: var(--generated-soft-strong);
        color: var(--generated-muted);
      }

      .evidence-content .research-table td {
        background: rgba(4, 39, 77, 0.42);
      }

      .evidence-content details.transcript-excerpt {
        border-color: var(--generated-line);
        background: var(--generated-soft);
      }

      details.transcript-excerpt {
        border: 1px solid var(--line);
        border-radius: 7px;
        margin: 7px 0;
        padding: 8px 9px;

      }

      details.transcript-excerpt summary {
        cursor: pointer;
        font-weight: 700;
      }

      .choice {
        width: min(100%, 700px);
        padding: 10px;
        border: 1px solid var(--generated-line);
        border-radius: 9px;
        background: var(--generated-surface);
        color: var(--generated-text);
        box-shadow: var(--aegis-glow);
      }

      .choice h3 {
        margin: 0 0 8px;
        font-size: 13px;
        line-height: 1.25;
      }

      .choice-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        align-items: start;
        gap: 6px;
      }

      .choice button {
        display: grid;
        align-content: center;
        gap: 2px;
        min-height: 44px;
        max-height: 74px;
        padding: 7px 9px;
        border-color: var(--generated-line);
        border-radius: 7px;
        background: var(--generated-soft);
        color: var(--generated-text);
        text-align: left;
        overflow: hidden;
      }

      .choice-title {
        display: block;
        font-weight: 750;
        overflow-wrap: anywhere;
      }

      .choice-desc {
        display: -webkit-box;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
        color: var(--generated-muted);
        font-size: 10px;
        line-height: 1.25;
        overflow: hidden;
        overflow-wrap: anywhere;

      .choice button:hover .choice-desc {

      }

      .choice.selected button:not(.selected-option) {
        opacity: 0.5;

      .composer {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
        padding: 10px;
        border-top: 1px solid var(--line);

      .source-filter {
        grid-column: 1 / -1;
        display: flex;
        align-items: center;

        min-width: 0;

      }

      .source-filter-label {
        color: var(--muted);
        font-size: 10px;
        font-weight: 800;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .source-preset,
      .source-option {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-height: 28px;
        padding: 5px 8px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: #ffffff;
        color: var(--muted);
        font-size: 11px;
        font-weight: 750;
        line-height: 1.1;
        white-space: nowrap;
      }

      .source-preset {
        color: var(--text);
      }

      .source-preset[aria-pressed="true"],
      .source-option:has(input:checked) {
        border-color: rgba(0, 93, 170, 0.42);
        background: var(--soft);
        color: var(--aegis-navy);

      .source-options {
        display: flex;
        align-items: center;
        gap: 6px;
        min-width: 0;
        flex-wrap: wrap;

      .source-option input {
        width: 13px;
        height: 13px;
        margin: 0;
        accent-color: var(--accent);
      }

      textarea {
        width: 100%;
        min-height: 38px;
        max-height: 120px;
        resize: vertical;
        border: 1px solid var(--line);
        border-radius: 9px;
        padding: 9px 11px;
        color: var(--text);
        font: inherit;
        font-size: 13px;
        line-height: 1.35;
      }

      textarea:focus,
      button:focus-visible {
        outline: 2px solid rgba(0, 93, 170, 0.28);
        outline-offset: 2px;
      }

      button {
        border: 1px solid var(--line);
        border-radius: 9px;
        background: #ffffff;
        color: var(--text);
        cursor: pointer;
        font: inherit;
        font-weight: 750;
