<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Functions Assist</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f8fb;
        --panel: #ffffff;
        --text: #17202a;
        --muted: #64748b;
        --line: #e1e7ef;
        --line-dark: #17355f;
        --accent: #005daa;
        --accent-dark: #062b60;
        --soft: #eef6ff;
        --soft-2: #f8fafc;
        --danger: #b42318;
        --shadow: 0 18px 46px rgba(15, 23, 42, 0.07);
        --aegis-navy: #062b60;
        --aegis-blue: #005daa;
        --aegis-cyan: #00a6d6;
        --aegis-gold: #fdb515;
        --aegis-ice: #f3f8fd;
        --aegis-line: rgba(0, 93, 170, 0.18);
        --aegis-glow: 0 18px 42px rgba(6, 43, 96, 0.12);
        --generated-surface: linear-gradient(
          135deg,
          rgba(6, 43, 96, 0.98) 0%,
          rgba(0, 93, 170, 0.96) 52%,
          rgba(4, 39, 77, 0.98) 100%
        );
        --generated-line: rgba(255, 255, 255, 0.16);
        --generated-soft: rgba(255, 255, 255, 0.08);
        --generated-soft-strong: rgba(255, 255, 255, 0.14);
        --generated-text: #ffffff;
        --generated-muted: rgba(255, 255, 255, 0.74);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        letter-spacing: 0;
        -webkit-font-smoothing: antialiased;
        text-rendering: geometricPrecision;
      }

      .app {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        height: 100vh;
        max-width: 1120px;
        margin: 0 auto;
        padding: 14px;
      }

      .chat {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        min-height: 0;
        background: var(--panel);
        border: 1px solid rgba(15, 23, 42, 0.08);
        border-radius: 10px;
        box-shadow: var(--shadow);
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding: 12px 16px;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.82);
      }

      .brand {
        display: flex;
        flex-direction: column;
        gap: 1px;
      }

      .brand h1 {
        margin: 0;
        color: var(--aegis-navy);
        font-size: 16px;
        font-weight: 760;
        line-height: 1.15;
      }

      .brand span,
      .connection {
        color: var(--muted);
        font-size: 11px;
        font-weight: 650;
      }

      .connection {
        padding: 4px 8px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--soft-2);
        white-space: nowrap;
      }

      .messages {
        overflow-y: auto;
        padding: 16px 18px;
      }

      .message {
        display: grid;
        gap: 6px;
        max-width: 860px;
        margin-bottom: 14px;
      }

      .message.user {
        margin-left: auto;
        justify-items: end;
      }

      .message-label {
        color: var(--muted);
        font-size: 10px;
        font-weight: 750;
        text-transform: uppercase;
      }

      .bubble {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px 12px;
        line-height: 1.45;
        font-size: 13px;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }

      .message.user .bubble {
        background: var(--accent);
        border-color: var(--accent);
        color: #ffffff;
      }

      .message.error .bubble {
        background: #fff4f2;
        border-color: #ffd6d1;
        color: var(--danger);
      }

      .assistant-turn {
        display: grid;
        gap: 9px;
        max-width: 880px;
        margin: 0 0 16px;
      }

      .response-frame {
        display: grid;
        gap: 9px;
        padding: 10px;
        border: 1px solid rgba(0, 93, 170, 0.12);
        border-radius: 10px;
        background: linear-gradient(180deg, #ffffff 0%, #fbfcfb 100%);
      }

      .status-panel {
        position: relative;
        overflow: hidden;
        border: 1px solid var(--generated-line);
        border-radius: 7px;
        background: var(--generated-surface);
        box-shadow: var(--aegis-glow);
        isolation: isolate;
      }

      .status-panel.hidden {
        display: none;
      }

      .status-panel.complete {
        border-color: var(--generated-line);
        background: var(--generated-surface);
      }

      .status-panel.in-response {
        border-radius: 9px;
      }

      .status-panel.in-response::after {
        border-radius: 8px;
      }

      .status-panel.complete::before {
        display: none;
      }

      .status-panel::before {
        content: "";
        position: absolute;
        inset: -80px;
        z-index: -1;
        background: conic-gradient(
          from 0deg,
          rgba(255, 255, 255, 0),
          rgba(255, 255, 255, 0),
          rgba(0, 166, 214, 0.9),
          rgba(253, 181, 21, 0.45),
          rgba(255, 255, 255, 0)
        );
        animation: border-sweep 1.8s linear infinite;
      }

      .status-panel::after {
        content: "";
        position: absolute;
        inset: 2px;
        z-index: -1;
        border-radius: 6px;
        background: var(--generated-surface);
      }

      @keyframes border-sweep {
        to {
          transform: rotate(360deg);
        }
      }

      .status-toggle {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        align-items: center;
        gap: 8px;
        width: 100%;
        min-height: 32px;
        padding: 6px 9px;
        border: 0;
        background: transparent;
        color: var(--generated-text);
        text-align: left;
      }

      .loader {
        position: relative;
        width: 14px;
        height: 14px;
        border: 2px solid rgba(255, 255, 255, 0.2);
        border-top-color: var(--aegis-cyan);
        border-radius: 999px;
        animation: spin 0.85s linear infinite;
      }

      .status-panel.complete .loader {
        width: 8px;
        height: 8px;
        background: var(--aegis-cyan);
        border-color: var(--aegis-cyan);
        animation: none;
      }

      .status-panel.complete .loader::after {
        display: none;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .status-text {
        min-width: 0;
        color: var(--generated-text);
        font-size: 11px;
        font-weight: 750;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .status-count {
        color: var(--generated-muted);
        font-size: 10px;
        font-weight: 650;
        white-space: nowrap;
      }

      .status-timeline {
        display: grid;
        gap: 7px;
        max-height: 160px;
        overflow-y: auto;
        padding: 0 10px 10px 32px;
      }

      .status-panel:not(.collapsed) .status-timeline {
        border-top: 1px solid var(--generated-line);
        padding-top: 9px;
      }

      .status-panel.collapsed .status-timeline {
        display: none;
      }

      .status-row {
        display: grid;
        gap: 2px;
        color: var(--generated-muted);
        font-size: 11px;
        line-height: 1.35;
      }

      .status-row strong {
        color: var(--generated-text);
        font-size: 11px;
        text-transform: uppercase;
      }

      .main-response {
        min-height: 56px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
        padding: 12px 13px;
        line-height: 1.5;
        font-size: 13.5px;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }

      .main-response.pending {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr);
        align-items: center;
        gap: 8px;
        color: var(--muted);
        background: var(--soft-2);
      }

      .main-response.pending::before {
        content: "";
        width: 7px;
        height: 7px;
        border-radius: 999px;
        background: var(--accent);
      }

      .main-response.status-feed {
        display: block;
        border-color: var(--generated-line);
        color: var(--generated-text);
        background: var(--generated-surface);
        box-shadow: var(--aegis-glow);
      }

      .main-response.status-feed::before {
        display: none;
      }

      .progress-log {
        display: grid;
        gap: 7px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .progress-entry {
        display: grid;
        gap: 2px;
        padding-left: 15px;
        position: relative;
        color: var(--generated-muted);
        font-size: 12px;
        line-height: 1.4;
      }

      .progress-entry::before {
        content: "";
        position: absolute;
        top: 0.62em;
        left: 0;
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background: var(--accent);
      }

      .progress-entry strong {
        color: var(--generated-text);
        font-size: 11px;
        text-transform: uppercase;
      }

      .research-status-board {
        display: grid;
        gap: 8px;
      }

      .research-status-head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
      }

      .research-status-title {
        color: var(--generated-text);
        font-size: 11px;
        font-weight: 850;
        text-transform: uppercase;
      }

      .research-status-updated {
        color: var(--generated-muted);
        font-size: 10px;
        font-weight: 650;
        white-space: nowrap;
      }

      .research-source-strip {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 5px;
      }

      .research-source-tile {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        align-items: center;
        gap: 5px;
        min-height: 26px;
        padding: 4px 6px;
        border: 1px solid var(--generated-line);
        border-radius: 7px;
        background: rgba(255, 255, 255, 0.07);
        color: var(--generated-text);
      }

      .research-source-dot {
        width: 7px;
        height: 7px;
        border-radius: 999px;
        background: var(--generated-muted);
      }

      .research-source-tile.checking .research-source-dot,
      .research-source-tile.in_progress .research-source-dot,
      .research-source-tile.incomplete .research-source-dot {
        background: var(--aegis-gold);
      }

      .research-source-tile.complete .research-source-dot,
      .research-source-tile.partial .research-source-dot {
        background: var(--aegis-cyan);
      }

      .research-source-tile.error .research-source-dot {
        background: #ffb4a9;
      }

      .research-source-name {
        min-width: 0;
        overflow: hidden;
        color: var(--generated-text);
        font-size: 10px;
        font-weight: 820;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .research-source-status {
        color: var(--generated-muted);
        font-size: 9px;
        font-weight: 780;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .research-status-summary {
        display: grid;
        gap: 5px;
        max-height: 150px;
        overflow-y: auto;
        padding: 6px;
        border: 1px solid var(--generated-line);
        border-radius: 8px;
        background: var(--generated-soft);
      }

      .research-status-summary strong {
        color: var(--generated-text);
        font-size: 9.5px;
        text-transform: uppercase;
      }

      .research-status-summary p {
        margin: 0;
        color: var(--generated-muted);
        font-size: 12px;
        line-height: 1.42;
      }

      .research-summary-list {
        display: grid;
        gap: 4px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .research-summary-list li {
        display: grid;
        gap: 2px;
        padding: 5px 6px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.05);
        color: var(--generated-muted);
        font-size: 10.5px;
        line-height: 1.3;
      }

      .research-summary-meta {
        display: flex;
        align-items: center;
        gap: 6px;
        min-width: 0;
      }

      .research-summary-label,
      .research-summary-counts {
        white-space: nowrap;
      }

      .research-summary-label {
        color: var(--generated-text);
        min-width: 0;
        overflow: hidden;
        font-size: 9.5px;
        font-weight: 850;
        text-overflow: ellipsis;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .research-summary-counts {
        color: var(--generated-muted);
        font-size: 9px;
        font-weight: 760;
      }

      .research-summary-body {
        color: var(--generated-muted);
        font-size: 10.5px;
        line-height: 1.32;
      }

      .research-summary-empty {
        color: var(--generated-muted);
        font-size: 10.5px;
        line-height: 1.3;
      }

      .main-response.empty {
        display: none;
      }

      .main-response.document {
        padding: 14px;
        line-height: 1.55;
        white-space: normal;
      }

      .main-response.document h1,
      .main-response.document h2,
      .main-response.document h3 {
        margin: 8px 0 2px;
        line-height: 1.25;
      }

      .main-response.document h1 {
        font-size: 19px;
      }

      .main-response.document h2 {
        font-size: 16px;
      }

      .main-response.document h3 {
        font-size: 13px;
      }

      .main-response.polished {
        padding: 0;
        border: 0;
        background: transparent;
        white-space: normal;
      }

      .research-answer {
        display: grid;
        gap: 9px;
      }

      .answer-hero,
      .metric-card {
        border: 1px solid var(--aegis-line);
        border-radius: 9px;
        background: #ffffff;
      }

      .answer-hero {
        position: relative;
        display: grid;
        gap: 9px;
        overflow: hidden;
        padding: 15px 16px;
        color: #ffffff;
        border-color: rgba(255, 255, 255, 0.16);
        background: var(--generated-surface);
        box-shadow: var(--aegis-glow);
        isolation: isolate;
      }

      .answer-hero::before {
        content: "";
        position: absolute;
        inset: -42% -28% -58% -24%;
        z-index: -1;
        background:
          radial-gradient(82% 66% at 98% 3%, transparent 44%, rgba(0, 166, 214, 0.58) 45%, transparent 46.4%, transparent 53%, rgba(253, 181, 21, 0.44) 54%, transparent 55.3%, transparent 62%, rgba(255, 255, 255, 0.28) 63%, transparent 64.2%),
          radial-gradient(90% 76% at 104% 1%, transparent 51%, rgba(82, 207, 255, 0.32) 52%, transparent 53.1%),
          linear-gradient(145deg, transparent 0%, rgba(255, 255, 255, 0.08) 42%, transparent 66%);
        opacity: 0.92;
        transform: rotate(-7deg);
      }

      .answer-hero::after {
        content: "";
        position: absolute;
        right: -12%;
        bottom: -58%;
        z-index: -1;
        width: 58%;
        height: 130%;
        background: radial-gradient(circle, rgba(253, 181, 21, 0.22), transparent 62%);
      }

      .answer-hero > * {
        position: relative;
      }

      .answer-eyebrow {
        color: rgba(255, 255, 255, 0.74);
        font-size: 10px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .answer-headline {
        margin: 0;
        color: #ffffff;
        font-size: 18px;
        line-height: 1.22;
        font-weight: 780;
        max-width: 760px;
      }

      .answer-dek {
        margin: 0;
        max-width: 760px;
        color: rgba(255, 255, 255, 0.78);
        font-size: 12px;
        line-height: 1.45;
      }

      .citation-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-height: 23px;
        border-radius: 999px;
        font-size: 10.5px;
        font-weight: 750;
        line-height: 1;
      }

      .metric-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
      }

      .metric-card {
        position: relative;
        display: grid;
        gap: 6px;
        min-height: 78px;
        padding: 10px;
        overflow: hidden;
        border-color: rgba(0, 166, 214, 0.22);
        background: linear-gradient(180deg, #f4fbff 0%, #e8f4fb 100%);
        box-shadow: 0 14px 34px rgba(6, 43, 96, 0.1);
      }

      .metric-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, var(--aegis-cyan), var(--aegis-gold));
      }

      .metric-card::after {
        display: none;
      }

      .metric-label {
        position: relative;
        color: #47708b;
        font-size: 9.5px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .metric-value {
        position: relative;
        color: var(--aegis-navy);
        font-size: 19px;
        font-weight: 800;
        line-height: 1;
      }

      .metric-context {
        position: relative;
        color: #5b7285;
        font-size: 11px;
        line-height: 1.32;
      }

      .answer-section {
        padding: 2px 1px;
      }

      .final-body {
        color: var(--text);
        font-size: 13.5px;
        line-height: 1.52;
      }

      .final-body.drafting {
        display: grid;
        align-items: center;
        min-height: 40px;
      }

      .final-body.drafting::before {
        content: "";
        display: block;
        width: min(360px, 72%);
        height: 10px;
        border-radius: 999px;
        background: linear-gradient(90deg, #eef3f8 0%, #dfeaf5 42%, #eef3f8 84%);
        background-size: 220% 100%;
        animation: draft-pulse 1.15s ease-in-out infinite;
      }

      @keyframes draft-pulse {
        to {
          background-position: -220% 0;
        }
      }

      .final-body.body-only {
        min-height: 56px;
      }

      .final-body h1,
      .final-body h2,
      .final-body h3 {
        margin: 9px 0 3px;
        line-height: 1.25;
      }

      .final-body h1 {
        font-size: 18px;
      }

      .final-body h2 {
        font-size: 15.5px;
      }

      .final-body h3 {
        font-size: 13px;
      }

      .final-body ul,
      .evidence-content ul {
        display: grid;
        gap: 6px;
        margin: 7px 0;
        padding-left: 18px;
      }

      .final-body li,
      .evidence-content li {
        padding-left: 2px;
      }

      .research-table-wrap {
        margin: 8px 0 10px;
        overflow-x: auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
      }

      .research-table {
        width: 100%;
        min-width: 420px;
        border-collapse: collapse;
        font-size: 12px;
        line-height: 1.35;
      }

      .research-table th,
      .research-table td {
        padding: 7px 9px;
        border-bottom: 1px solid var(--line);
        text-align: left;
        vertical-align: top;
      }

      .research-table th {
        background: #f5f8fb;
        color: var(--muted);
        font-size: 10px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .research-table tr:last-child td {
        border-bottom: 0;
      }

      .answer-section h3 {
        margin: 3px 0 7px;
        font-size: 13px;
        font-weight: 800;
      }

      .answer-bullets {
        display: grid;
        gap: 7px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .answer-bullets li {
        position: relative;
        padding-left: 15px;
        color: var(--text);
        font-size: 13px;
        line-height: 1.5;
      }

      .answer-bullets li::before {
        content: "";
        position: absolute;
        top: 0.68em;
        left: 0;
        width: 5px;
        height: 5px;
        border-radius: 999px;
        background: var(--accent);
      }

      .citation-row {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        margin-top: 6px;
      }

      .citation-chip {
        padding: 4px 7px;
        border: 1px solid var(--generated-line);
        background: var(--generated-surface);
        color: var(--generated-text);
        box-shadow: 0 5px 12px rgba(6, 43, 96, 0.13);
      }

      a.citation-chip {
        color: var(--generated-text);
        text-decoration: none;
      }

      a.citation-chip:hover {
        border-color: rgba(0, 166, 214, 0.58);
        background: linear-gradient(135deg, rgba(0, 93, 170, 0.98), rgba(4, 39, 77, 0.98));
      }

      .final-body a {
        color: #1b8fd6;
      }

      .final-body a.citation-chip {
        border-color: rgba(0, 166, 214, 0.28);
        background: #e9f7ff;
        color: #1179bd;
        box-shadow: 0 5px 12px rgba(0, 93, 170, 0.1);
      }

      .final-body a.citation-chip:hover {
        border-color: rgba(0, 166, 214, 0.42);
        background: #d8f1ff;
        color: #005daa;
      }

      .evidence-stack,
      .trace-stack {
        display: block;
      }

      .evidence-stack.empty,
      .trace-stack.empty {
        display: none;
      }

      .evidence-panel {
        border: 1px solid var(--generated-line);
        border-radius: 9px;
        color: var(--generated-text);
        background: var(--generated-surface);
        overflow: hidden;
        box-shadow: var(--aegis-glow);
      }

      .evidence-summary {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        width: 100%;
        min-height: 32px;
        padding: 7px 10px;
        border: 0;
        border-radius: 0;
        background: transparent;
        color: var(--generated-text);
        text-align: left;
      }

      .evidence-title {
        color: var(--generated-text);
        font-size: 10px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .evidence-hint {
        color: var(--generated-muted);
        font-size: 10px;
        font-weight: 650;
        white-space: nowrap;
      }

      .evidence-panel.collapsed .evidence-tabs,
      .evidence-panel.collapsed .evidence-content {
        display: none;
      }

      .evidence-tabs {
        display: flex;
        align-items: end;
        flex-wrap: wrap;
        gap: 3px;
        padding: 6px 8px 0;
        border-top: 1px solid var(--generated-line);
        border-bottom: 1px solid var(--generated-line);
        background: var(--generated-soft);
      }

      .evidence-tab {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        width: auto;
        min-height: 27px;
        margin-bottom: -1px;
        padding: 5px 9px;
        border: 1px solid var(--generated-line);
        border-bottom-color: var(--generated-line);
        border-radius: 6px 6px 0 0;
        background: var(--generated-soft);
        color: var(--generated-muted);
        font-size: 11px;
        font-weight: 750;
        white-space: nowrap;
      }

      .evidence-tab::before {
        display: none;
      }

      .evidence-tab[aria-expanded="true"] {
        background: var(--generated-soft-strong);
        border-color: rgba(255, 255, 255, 0.24);
        border-bottom-color: transparent;
        color: var(--generated-text);
      }

      .evidence-content {
        border-top: 1px solid var(--generated-line);
        max-height: 320px;
        overflow-y: auto;
        padding: 10px;
        font-size: 12px;
        line-height: 1.5;
        color: rgba(255, 255, 255, 0.84);
        background: rgba(4, 39, 77, 0.66);
      }

      .evidence-content.empty {
        display: none;
      }

      .evidence-content h3 {
        color: var(--generated-text);
        margin: 8px 0 6px;
        font-size: 13px;
      }

      .evidence-content strong {
        color: var(--generated-text);
      }

      .evidence-content .citation-chip {
        background: var(--generated-soft-strong);
      }

      .evidence-content .research-table-wrap {
        border-color: var(--generated-line);
        background: var(--generated-soft);
      }

      .evidence-content .research-table {
        color: var(--generated-text);
      }

      .evidence-content .research-table th,
      .evidence-content .research-table td {
        border-bottom-color: var(--generated-line);
      }

      .evidence-content .research-table th {
        background: var(--generated-soft-strong);
        color: var(--generated-muted);
      }

      .evidence-content .research-table td {
        background: rgba(4, 39, 77, 0.42);
      }

      .evidence-content details.transcript-excerpt {
        border-color: var(--generated-line);
        background: var(--generated-soft);
      }

      details.transcript-excerpt {
        border: 1px solid var(--line);
        border-radius: 7px;
        margin: 7px 0;
        padding: 8px 9px;
        background: var(--soft-2);
      }

      details.transcript-excerpt summary {
        cursor: pointer;
        font-weight: 700;
      }

      .choice {
        width: min(100%, 700px);
        padding: 10px;
        border: 1px solid var(--generated-line);
        border-radius: 9px;
        background: var(--generated-surface);
        color: var(--generated-text);
        box-shadow: var(--aegis-glow);
      }

      .choice h3 {
        margin: 0 0 8px;
        font-size: 13px;
        line-height: 1.25;
      }

      .choice-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        align-items: start;
        gap: 6px;
      }

      .choice button {
        display: grid;
        align-content: center;
        gap: 2px;
        min-height: 44px;
        max-height: 74px;
        padding: 7px 9px;
        border-color: var(--generated-line);
        border-radius: 7px;
        background: var(--generated-soft);
        color: var(--generated-text);
        text-align: left;
        overflow: hidden;
      }

      .choice-title {
        display: block;
        font-weight: 750;
        overflow-wrap: anywhere;
      }

      .choice-desc {
        display: -webkit-box;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
        color: var(--generated-muted);
        font-size: 10px;
        line-height: 1.25;
        overflow: hidden;
        overflow-wrap: anywhere;
      }

      .choice button:hover .choice-desc {
        color: #e8fffb;
      }

      .choice.selected button:not(.selected-option) {
        opacity: 0.5;
      }

      .composer {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
        padding: 10px;
        border-top: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.86);
      }

      .source-filter {
        grid-column: 1 / -1;
        display: flex;
        align-items: center;
        gap: 7px;
        min-width: 0;
        flex-wrap: wrap;
      }

      .source-filter-label {
        color: var(--muted);
        font-size: 10px;
        font-weight: 800;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .source-preset,
      .source-option {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-height: 28px;
        padding: 5px 8px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: #ffffff;
        color: var(--muted);
        font-size: 11px;
        font-weight: 750;
        line-height: 1.1;
        white-space: nowrap;
      }

      .source-preset {
        color: var(--text);
      }

      .source-preset[aria-pressed="true"],
      .source-option:has(input:checked) {
        border-color: rgba(0, 93, 170, 0.42);
        background: var(--soft);
        color: var(--aegis-navy);
      }

      .source-options {
        display: flex;
        align-items: center;
        gap: 6px;
        min-width: 0;
        flex-wrap: wrap;
      }

      .source-option input {
        width: 13px;
        height: 13px;
        margin: 0;
        accent-color: var(--accent);
      }

      textarea {
        width: 100%;
        min-height: 38px;
        max-height: 120px;
        resize: vertical;
        border: 1px solid var(--line);
        border-radius: 9px;
        padding: 9px 11px;
        color: var(--text);
        font: inherit;
        font-size: 13px;
        line-height: 1.35;
      }

      textarea:focus,
      button:focus-visible {
        outline: 2px solid rgba(0, 93, 170, 0.28);
        outline-offset: 2px;
      }

      button {
        border: 1px solid var(--line);
        border-radius: 9px;
        background: #ffffff;
        color: var(--text);
        cursor: pointer;
        font: inherit;
        font-weight: 750;
      }

      .send {
        min-width: 78px;
        background: var(--accent);
        border-color: var(--accent);
        color: #ffffff;
        font-size: 13px;
      }

      .send:hover,
      .choice button:hover {
        background: var(--accent-dark);
        border-color: var(--accent-dark);
        color: #ffffff;
      }

      @media (max-width: 900px) {
        .app {
          height: auto;
          min-height: 100vh;
        }

        .chat {
          min-height: 72vh;
        }
      }

      @media (max-width: 560px) {
        .app {
          padding: 9px;
        }

        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .choice-grid,
        .metric-grid,
        .research-source-strip,
        .composer {
          grid-template-columns: 1fr;
        }

        .source-filter {
          align-items: stretch;
        }

        .source-options {
          width: 100%;
        }

        .response-frame {
          padding: 10px;
        }

        .send {
          min-height: 40px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="chat">
        <header class="topbar">
          <div class="brand">
            <h1>Functions Assist</h1>
            <span>AEGIS - External Research and Analysis</span>
          </div>
          <div id="connection" class="connection">Connecting</div>
        </header>

        <div id="messages" class="messages"></div>

        <form id="composer" class="composer">
          <div class="source-filter" aria-label="Data source filter">
            <span class="source-filter-label">Sources</span>
            <button
              id="sourceDefault"
              class="source-preset"
              type="button"
              aria-pressed="true"
            >
              Auto
            </button>
            <div id="sourceOptions" class="source-options">
              <label class="source-option">
                <input type="checkbox" name="source-filter" value="transcripts" />
                <span>Transcripts</span>
              </label>
              <label class="source-option">
                <input type="checkbox" name="source-filter" value="event_transcripts" />
                <span>Event transcripts</span>
              </label>
              <label class="source-option">
                <input type="checkbox" name="source-filter" value="investor_slides" />
                <span>Investor slides</span>
              </label>
              <label class="source-option">
                <input type="checkbox" name="source-filter" value="supplementary_financials" />
                <span>Supplementary financials</span>
              </label>
              <label class="source-option">
                <input type="checkbox" name="source-filter" value="rts" />
                <span>Reports to shareholders</span>
              </label>
              <label class="source-option">
                <input type="checkbox" name="source-filter" value="pillar3" />
                <span>Pillar 3</span>
              </label>
            </div>
          </div>
          <textarea id="input" placeholder="Ask about Q1 2026 Canadian bank disclosures, slides, or regulatory reports"></textarea>
          <button class="send" type="submit">Send</button>
        </form>
      </section>
    </main>

    <script>
      const messages = document.getElementById("messages");
      const connection = document.getElementById("connection");
      const composer = document.getElementById("composer");
      const input = document.getElementById("input");
      const sourceDefault = document.getElementById("sourceDefault");
      const sourceCheckboxes = Array.from(
        document.querySelectorAll('input[name="source-filter"]'),
      );
      let ws;
      let activeTurn = null;
      let currentUserRequest = "";

      function getSelectedSourceFilter() {
        const selected = sourceCheckboxes
          .filter((checkbox) => checkbox.checked)
          .map((checkbox) => checkbox.value);
        return selected.length ? selected : null;
      }

      function updateSourceFilterState() {
        const hasFilter = Boolean(getSelectedSourceFilter());
        sourceDefault.setAttribute("aria-pressed", String(!hasFilter));
      }

      sourceDefault.addEventListener("click", () => {
        sourceCheckboxes.forEach((checkbox) => {
          checkbox.checked = false;
        });
        updateSourceFilterState();
      });

      sourceCheckboxes.forEach((checkbox) => {
        checkbox.addEventListener("change", updateSourceFilterState);
      });

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function evidenceDisplayLabel(reference, evidenceId) {
        return reference?.display_label || evidenceId;
      }

      function flattenEvidenceRegistry(registry) {
        const flat = {};
        Object.values(registry || {}).forEach((sourceGroup) => {
          Object.entries(sourceGroup || {}).forEach(([evidenceId, reference]) => {
            flat[evidenceId] = reference;
          });
        });
        return flat;
      }

      function renderEvidenceMarkers(value, evidenceRegistry = {}) {
        const flatRegistry = evidenceRegistry.__flat || flattenEvidenceRegistry(evidenceRegistry);
        return String(value || "").replace(/\[\[(E\d+)\]\]/g, (_match, evidenceId) => {
          const reference = flatRegistry[evidenceId];
          if (!reference) {
            return "";
          }
          const label = escapeHtml(evidenceDisplayLabel(reference, evidenceId));
          const href = reference.href ? escapeHtml(reference.href) : "#";
          const sourceKey = escapeHtml(reference.source_id || "");
          return ` <a class="citation-chip evidence-link" href="${href}" target="_blank" rel="noopener noreferrer" data-evidence-id="${escapeHtml(evidenceId)}" data-source-key="${sourceKey}">${label}</a>`;
        });
      }

      function stripEvidenceMarkers(value) {
        return String(value || "").replace(/\[\[E\d+\]\]/g, "").replace(/\s+/g, " ").trim();
      }

      const demoS3BaseUrl = "https://example-bucket.s3.amazonaws.com/reports/";

      function buildLegacySourceHref(fileType, s3Key, locationLabel) {
        if (!s3Key) {
          return "#";
        }
        const safeKey = String(s3Key)
          .split("/")
          .map((part) => encodeURIComponent(part))
          .join("/");
        let href = `${demoS3BaseUrl.replace(/\/$/, "")}/${safeKey}`;
        const pageMatch = String(locationLabel || "").match(/\d+/);
        if (String(fileType || "").toLowerCase() === "pdf" && pageMatch) {
          href += `#page=${pageMatch[0]}`;
        }
        return href;
      }

      function renderLegacySourceLinks(value, sourceKey, sourceLabel) {
        return String(value || "").replace(
          /Source:\s*\{\{S3_LINK:open:([^:}]+):([^:}]+):([^}]*)\}\}(?:\s*\|\s*Page:\s*([^\n<]+))?/g,
          (_match, fileType, s3Key, _linkText, locationLabel) => {
            const pageMatch = String(locationLabel || "").match(/\d+/);
            const label =
              String(fileType || "").toLowerCase() === "pdf" && pageMatch
                ? `${sourceLabel} p.${pageMatch[0]}`
                : `${sourceLabel}${locationLabel ? ` ${String(locationLabel).trim()}` : ""}`;
            const href = buildLegacySourceHref(fileType, s3Key, locationLabel);
            return `<a class="citation-chip evidence-link" href="${escapeHtml(
              href,
            )}" target="_blank" rel="noopener noreferrer" data-source-key="${escapeHtml(
              sourceKey,
            )}">${escapeHtml(label)}</a>`;
          },
        );
      }

      function renderEvidencePanelContent(sourceKey, sourceLabel, content) {
        const safeContent = escapeHtml(content || "");
        return renderMarkdown(renderLegacySourceLinks(safeContent, sourceKey, sourceLabel));
      }

      function splitMarkdownTableRow(line) {
        const trimmed = String(line || "").trim();
        const bounded = trimmed.startsWith("|") && trimmed.endsWith("|")
          ? trimmed.slice(1, -1)
          : trimmed;
        return bounded.split("|").map((cell) => cell.trim());
      }

      function isMarkdownTableDivider(line) {
        const cells = splitMarkdownTableRow(line);
        return cells.length > 1 && cells.every((cell) => /^:?-{3,}:?$/.test(cell));
      }

      function isMarkdownTableStart(lines, index) {
        const line = String(lines[index] || "").trim();
        const next = String(lines[index + 1] || "").trim();
        return line.includes("|") && isMarkdownTableDivider(next);
      }

      function renderInlineMarkdown(value, evidenceRegistry = {}) {
        let html = String(value || "");
        html = html.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
        return renderEvidenceMarkers(html, evidenceRegistry);
      }

      function renderMarkdownTable(lines, startIndex, evidenceRegistry = {}) {
        const headers = splitMarkdownTableRow(lines[startIndex]);
        const rows = [];
        let index = startIndex + 2;
        while (index < lines.length && String(lines[index] || "").trim().includes("|")) {
          const rawLine = String(lines[index] || "").trim();
          if (!rawLine || isMarkdownTableDivider(rawLine)) {
            break;
          }
          rows.push(splitMarkdownTableRow(rawLine));
          index += 1;
        }

        const headerHtml = headers
          .map((cell) => `<th>${renderInlineMarkdown(cell, evidenceRegistry)}</th>`)
          .join("");
        const rowHtml = rows
          .map((row) => {
            const cells = headers.map((_, cellIndex) =>
              `<td>${renderInlineMarkdown(row[cellIndex] || "", evidenceRegistry)}</td>`,
            );
            return `<tr>${cells.join("")}</tr>`;
          })
          .join("");
        return {
          html: `<div class="research-table-wrap"><table class="research-table"><thead><tr>${headerHtml}</tr></thead><tbody>${rowHtml}</tbody></table></div>`,
          nextIndex: index,
        };
      }

      function consumeList(lines, startIndex, evidenceRegistry = {}) {
        const items = [];
        let index = startIndex;
        while (index < lines.length) {
          const match = String(lines[index] || "").match(/^\s*[-*]\s+(.+)$/);
          if (!match) {
            break;
          }
          items.push(`<li>${renderInlineMarkdown(match[1], evidenceRegistry)}</li>`);
          index += 1;
        }
        return { html: `<ul>${items.join("")}</ul>`, nextIndex: index };
      }

      function renderMarkdown(value, evidenceRegistry = {}) {
        const normalized = String(value || "")
          .replaceAll("&lt;details&gt;", '<details class="transcript-excerpt">')
          .replaceAll("&lt;/details&gt;", "</details>")
          .replaceAll("&lt;summary&gt;", "<summary>")
          .replaceAll("&lt;/summary&gt;", "</summary>");
        const lines = normalized.split(/\n/);
        const blocks = [];

        for (let index = 0; index < lines.length;) {
          const line = String(lines[index] || "");
          const trimmed = line.trim();

          if (!trimmed) {
            index += 1;
            continue;
          }

          if (isMarkdownTableStart(lines, index)) {
            const table = renderMarkdownTable(lines, index, evidenceRegistry);
            blocks.push(table.html);
            index = table.nextIndex;
            continue;
          }

          const heading = trimmed.match(/^(#{1,3})\s+(.+)$/);
          if (heading) {
            const level = heading[1].length;
            blocks.push(`<h${level}>${renderInlineMarkdown(heading[2], evidenceRegistry)}</h${level}>`);
            index += 1;
            continue;
          }

          if (/^\s*[-*]\s+/.test(line)) {
            const list = consumeList(lines, index, evidenceRegistry);
            blocks.push(list.html);
            index = list.nextIndex;
            continue;
          }

          if (trimmed.startsWith("<details") || trimmed.startsWith("</details>") || trimmed.startsWith("<summary") || trimmed.startsWith("</summary>")) {
            blocks.push(trimmed);
            index += 1;
            continue;
          }

          const paragraph = [trimmed];
          index += 1;
          while (
            index < lines.length &&
            String(lines[index] || "").trim() &&
            !isMarkdownTableStart(lines, index) &&
            !String(lines[index] || "").trim().match(/^(#{1,3})\s+/) &&
            !/^\s*[-*]\s+/.test(String(lines[index] || ""))
          ) {
            paragraph.push(String(lines[index] || "").trim());
            index += 1;
          }
          blocks.push(`<p>${renderInlineMarkdown(paragraph.join("<br />"), evidenceRegistry)}</p>`);
        }

        return blocks.join("");
      }

      function titleCaseSource(value) {
        const normalized = String(value || "")
          .replaceAll("_", " ")
          .replaceAll("-", " ")
          .replace(/\s+/g, " ")
          .trim();
        const lower = normalized.toLowerCase();

        if (lower === "rts") {
          return "RTS";
        }
        if (lower === "pillar3" || lower === "pillar 3") {
          return "Pillar 3";
        }

        return normalized
          .replace(/\b\w/g, (char) => char.toUpperCase())
          .replace(/\bRts\b/g, "RTS");
      }

      function normalizeFinalShell(shell) {
        const normalized = shell || {};
        return {
          render_mode: normalized.render_mode || "custom",
          summary: normalized.summary || null,
          tiles: Array.isArray(normalized.tiles) ? normalized.tiles.slice(0, 4) : [],
          body_style: normalized.body_style || "user_requested_format",
        };
      }

      function renderMetricTiles(tiles, evidenceRegistry) {
        if (!tiles.length) {
          return "";
        }

        return `<div class="metric-grid">${tiles
          .map((tile) => {
            const contextText = stripEvidenceMarkers(tile.context || "");
            return `<div class="metric-card"><div class="metric-label">${escapeHtml(
              stripEvidenceMarkers(tile.label || "Metric"),
            )}</div><div class="metric-value">${escapeHtml(
              stripEvidenceMarkers(tile.value || "-"),
            )}</div>${
              contextText ? `<div class="metric-context">${escapeHtml(contextText)}</div>` : ""
            }</div>`;
          })
          .join("")}</div>`;
      }

      function renderFinalBody(turn) {
        if (!turn.finalBody) {
          renderFinalResponseShell(turn, turn.responseShell || null);
        }
        const compactText = String(turn.answerText || "").replace(/\n{3,}/g, "\n\n");
        turn.finalBody.classList.toggle("drafting", !compactText.trim());
        if (!compactText.trim()) {
          turn.finalBody.innerHTML = "";
          return;
        }
        turn.finalBody.innerHTML = renderMarkdown(escapeHtml(compactText), turn.evidenceRegistry);
      }

      function renderFinalResponseShell(turn, shellInput) {
        const shell = normalizeFinalShell(shellInput);
        turn.responseShell = shell;
        turn.responseStarted = true;
        turn.progressLog = null;
        turn.main.className = "main-response polished";
        turn.main.innerHTML = "";
        collapseStatusTrace(turn);

        const article = document.createElement("article");
        article.className = `research-answer ${escapeHtml(shell.render_mode)}`;
        article.dataset.bodyStyle = shell.body_style;

        if (shell.summary) {
          const summary = shell.summary;
          const hero = document.createElement("section");
          hero.className = "answer-hero";
          hero.innerHTML = `<div class="answer-eyebrow">${escapeHtml(
            stripEvidenceMarkers(summary.eyebrow || "Aegis research brief"),
          )}</div><h2 class="answer-headline">${escapeHtml(
            stripEvidenceMarkers(summary.headline || "Research summary"),
          )}</h2>${
            summary.dek
              ? `<p class="answer-dek">${escapeHtml(stripEvidenceMarkers(summary.dek))}</p>`
              : ""
          }`;
          article.appendChild(hero);
        }

        const metricHtml = renderMetricTiles(shell.tiles || [], turn.evidenceRegistry);
        if (metricHtml) {
          const metrics = document.createElement("div");
          metrics.innerHTML = metricHtml;
          article.append(...Array.from(metrics.childNodes));
        }

        const body = document.createElement("section");
        body.className = "answer-section final-body";
        if (!shell.summary && !(shell.tiles || []).length) {
          body.classList.add("body-only");
        }
        article.appendChild(body);
        turn.main.appendChild(article);
        turn.finalBody = body;
        renderFinalBody(turn);
      }

      function startFinalResponse(shell) {
        const turn = beginAssistantTurn();
        turn.answerText = "";
        renderFinalResponseShell(turn, shell);
        scrollToBottom();
      }

      function scrollToBottom() {
        messages.scrollTop = messages.scrollHeight;
      }

      function appendMessage(role, label, content) {
        const wrapper = document.createElement("div");
        wrapper.className = `message ${role}`;
        const labelEl = document.createElement("div");
        labelEl.className = "message-label";
        labelEl.textContent = label;
        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.innerHTML = renderMarkdown(escapeHtml(content));
        wrapper.append(labelEl, bubble);
        messages.appendChild(wrapper);
        scrollToBottom();
      }

      function beginAssistantTurn() {
        if (activeTurn) {
          return activeTurn;
        }

        const root = document.createElement("div");
        root.className = "assistant-turn";

        const statusPanel = document.createElement("div");
        statusPanel.className = "status-panel collapsed";

        const statusButton = document.createElement("button");
        statusButton.type = "button";
        statusButton.className = "status-toggle";
        statusButton.setAttribute("aria-expanded", "false");

        const loader = document.createElement("span");
        loader.className = "loader";
        const statusText = document.createElement("span");
        statusText.className = "status-text";
        statusText.textContent = "Starting";
        const statusCount = document.createElement("span");
        statusCount.className = "status-count";
        statusCount.textContent = "0 updates";
        statusButton.append(loader, statusText, statusCount);

        const timeline = document.createElement("div");
        timeline.className = "status-timeline";

        statusButton.addEventListener("click", () => {
          statusPanel.classList.toggle("collapsed");
          statusButton.setAttribute(
            "aria-expanded",
            String(!statusPanel.classList.contains("collapsed")),
          );
        });

        statusPanel.append(statusButton, timeline);

        const responseFrame = document.createElement("div");
        responseFrame.className = "response-frame";

        const main = document.createElement("div");
        main.className = "main-response pending";
        main.textContent = "Preparing response";

        const evidence = document.createElement("div");
        evidence.className = "evidence-stack empty";

        const trace = document.createElement("div");
        trace.className = "trace-stack empty";

        responseFrame.append(main, evidence, trace);
        root.append(statusPanel, responseFrame);
        messages.appendChild(root);

        activeTurn = {
          root,
          responseFrame,
          statusPanel,
          statusText,
          statusCount,
          timeline,
          main,
          evidence,
          trace,
          statusButton,
          progressLog: null,
          statusEvents: [],
          summaryEvents: [],
          summariesMoved: false,
          evidenceRegistry: { __flat: {} },
          researchStatus: null,
          responseStarted: false,
          responseShell: null,
          finalBody: null,
          hasResearch: false,
          answerText: "",
          requestText: currentUserRequest,
          waitingForUser: false,
        };
        scrollToBottom();
        return activeTurn;
      }

      function updateStatusCount(turn) {
        turn.statusCount.textContent =
          turn.statusEvents.length === 1 ? "1 update" : `${turn.statusEvents.length} updates`;
      }

      function addStatusTimelineRow(turn, source, text) {
        turn.statusEvents.push({ source, text });
        updateStatusCount(turn);

        const row = document.createElement("div");
        row.className = "status-row";
        row.innerHTML = `<strong>${escapeHtml(source)}</strong>${escapeHtml(text)}`;
        turn.timeline.appendChild(row);
      }

      function appendProgressSummary(turn, source, text) {
        if (turn.responseStarted || turn.waitingForUser) {
          return;
        }

        if (!turn.progressLog) {
          turn.main.className = "main-response pending status-feed";
          turn.main.innerHTML = "";
          turn.progressLog = document.createElement("ol");
          turn.progressLog.className = "progress-log";
          turn.main.appendChild(turn.progressLog);
        }

        const item = document.createElement("li");
        item.className = "progress-entry";
        item.innerHTML = `<strong>${escapeHtml(source)}</strong>${escapeHtml(text)}`;
        turn.progressLog.appendChild(item);
      }

      function formatSnapshotTime(value) {
        if (!value) {
          return "Live";
        }
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) {
          return "Live";
        }
        return `Updated ${date.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })}`;
      }

      function ensureResearchStatusBoard(turn) {
        if (turn.researchStatus) {
          return turn.researchStatus;
        }

        turn.main.className = "main-response pending status-feed";
        turn.main.innerHTML = "";
        turn.progressLog = null;

        const board = document.createElement("section");
        board.className = "research-status-board";
        board.innerHTML = `
          <div class="research-status-head">
            <div class="research-status-title">Research status</div>
            <div class="research-status-updated">Live</div>
          </div>
          <div class="research-source-strip" aria-label="Research source status"></div>
          <div class="research-status-summary">
            <strong>Completed source summaries</strong>
            <ul class="research-summary-list">
              <li class="research-summary-empty">No research results completed yet.</li>
            </ul>
          </div>
        `;
        turn.main.appendChild(board);
        turn.researchStatus = {
          board,
          updated: board.querySelector(".research-status-updated"),
          sources: board.querySelector(".research-source-strip"),
          summary: board.querySelector(".research-summary-list"),
        };
        return turn.researchStatus;
      }

      function renderCompletedResearchSummaries(board, snapshot) {
        const summaries = Array.isArray(snapshot?.completed_summaries)
          ? snapshot.completed_summaries
          : [];
        if (!summaries.length) {
          board.summary.innerHTML =
            '<li class="research-summary-empty">No research results completed yet.</li>';
          return;
        }
        board.summary.innerHTML = summaries
          .map((item) => {
            const findings = Number(item.finding_count || 0);
            const gaps = Number(item.gap_count || 0);
            const countText = `${findings} finding${findings === 1 ? "" : "s"}${
              gaps ? ` / ${gaps} gap${gaps === 1 ? "" : "s"}` : ""
            }`;
            const summaryText =
              item.summary_text || item.quick_summary || "Research completed.";
            return `<li>
              <div class="research-summary-meta">
                <span class="research-summary-label">${escapeHtml(
                  item.source_label || item.source_id || "Source",
                )}</span>
                <span class="research-summary-counts">${escapeHtml(countText)}</span>
              </div>
              <div class="research-summary-body">${escapeHtml(summaryText)}</div>
            </li>`;
          })
          .join("");
      }

      function renderResearchStatusSnapshot(snapshot) {
        const turn = beginAssistantTurn();
        turn.hasResearch = true;
        if (turn.responseStarted || turn.waitingForUser) {
          return;
        }

        const board = ensureResearchStatusBoard(turn);
        const rows = Array.isArray(snapshot?.rows) ? snapshot.rows : [];
        board.updated.textContent = formatSnapshotTime(snapshot?.generated_at);
        renderCompletedResearchSummaries(board, snapshot);
        board.sources.innerHTML = rows
          .map((row) => {
            const status = escapeHtml(row.status || "pending");
            return `<div class="research-source-tile ${status}" title="${escapeHtml(
              row.detail || "",
            )}">
              <span class="research-source-dot"></span>
              <span class="research-source-name">${escapeHtml(
                row.source_label || row.source_id || "Source",
              )}</span>
              <span class="research-source-status">${escapeHtml(
                row.status_label || "Pending",
              )}</span>
            </div>`;
          })
          .join("");
        if (!rows.length) {
          board.sources.innerHTML =
            '<div class="research-summary-empty">Waiting for research to start.</div>';
        }
        scrollToBottom();
      }

      function moveSummariesIntoStatusTimeline(turn) {
        if (turn.summariesMoved) {
          return;
        }
        turn.summariesMoved = true;
        turn.summaryEvents.forEach((event) => {
          addStatusTimelineRow(turn, event.source, event.text);
        });
      }

      function collapseStatusTrace(turn) {
        moveSummariesIntoStatusTimeline(turn);
        if (!turn.hasResearch) {
          turn.statusPanel.classList.add("hidden", "collapsed");
          return;
        }
        turn.statusPanel.classList.remove("hidden");
        turn.statusPanel.classList.add("complete", "collapsed");
        turn.statusText.textContent = "Research trace";
        turn.statusButton.setAttribute("aria-expanded", "false");
      }

      function moveStatusTraceIntoResponse(turn) {
        if (!turn.trace || !turn.hasResearch) {
          return;
        }
        turn.trace.classList.remove("empty");
        turn.statusPanel.classList.add("in-response");
        if (turn.statusPanel.parentElement !== turn.trace) {
          turn.trace.appendChild(turn.statusPanel);
        }
      }

      function completeStatusPanel(turn) {
        moveSummariesIntoStatusTimeline(turn);
        const alreadyCompleted = turn.statusEvents.some(
          (event) => event.source === "Aegis" && event.text === "Response completed.",
        );
        if (!alreadyCompleted) {
          addStatusTimelineRow(turn, "Aegis", "Response completed.");
        }
        if (!turn.hasResearch) {
          turn.statusPanel.classList.add("hidden", "collapsed");
          turn.trace?.classList.add("empty");
          return;
        }
        turn.statusText.textContent = "Research trace";
        turn.statusPanel.classList.remove("hidden");
        turn.statusPanel.classList.add("complete", "collapsed");
        turn.statusButton.setAttribute("aria-expanded", "false");
        moveStatusTraceIntoResponse(turn);
      }

      function finishAssistantTurn() {
        if (!activeTurn) {
          return;
        }
        const completedRoot = activeTurn.root;
        const renderedFinal =
          activeTurn.responseStarted && (activeTurn.answerText.trim() || activeTurn.responseShell);
        if (renderedFinal) {
          completeStatusPanel(activeTurn);
        } else if (!activeTurn.waitingForUser) {
          activeTurn.statusPanel.classList.add("hidden");
        }
        if (!activeTurn.responseStarted && !activeTurn.waitingForUser) {
          activeTurn.main.classList.add("empty");
        }
        activeTurn = null;
        if (renderedFinal) {
          completedRoot.scrollIntoView({ block: "start" });
        } else {
          scrollToBottom();
        }
      }

      function completeChoiceTurn(turn) {
        if (!turn) {
          return;
        }
        turn.waitingForUser = false;
        turn.statusText.textContent = "Selection received";
        turn.statusPanel.classList.add("hidden", "collapsed");
        turn.trace?.classList.add("empty");
      }

      function addTurnStatus(label, content, options = {}) {
        const turn = beginAssistantTurn();
        if (options.research) {
          turn.hasResearch = true;
        }
        const text = content || "Working";
        const source = label || "Aegis";
        if (options.summary) {
          const summarySource = String(source).toLowerCase() === "aegis" ? "Status summary" : source;
          const summaryEvent = { source: summarySource, text };
          if (turn.summariesMoved || turn.responseStarted) {
            addStatusTimelineRow(turn, summaryEvent.source, summaryEvent.text);
          } else {
            turn.summaryEvents.push(summaryEvent);
            appendProgressSummary(turn, summaryEvent.source, summaryEvent.text);
          }
          scrollToBottom();
          return;
        }
        turn.statusText.textContent = text;
        addStatusTimelineRow(turn, source, text);
        scrollToBottom();
      }

      function appendAgentChunk(content) {
        const turn = beginAssistantTurn();
        if (!turn.responseStarted) {
          turn.answerText = "";
          renderFinalResponseShell(turn, {
            render_mode: "custom",
            summary: null,
            tiles: [],
            body_style: "user_requested_format",
          });
        }
        turn.answerText += content || "";
        renderFinalBody(turn);
        scrollToBottom();
      }

      function mergeEvidenceRegistry(turn, registry) {
        Object.entries(registry || {}).forEach(([sourceId, sourceGroup]) => {
          const targetGroup = turn.evidenceRegistry[sourceId] || {};
          Object.entries(sourceGroup || {}).forEach(([evidenceId, reference]) => {
            targetGroup[evidenceId] = reference;
            turn.evidenceRegistry.__flat[evidenceId] = reference;
          });
          turn.evidenceRegistry[sourceId] = targetGroup;
        });
        updateEvidenceSummary(turn);
        if (turn.responseShell) {
          renderFinalResponseShell(turn, turn.responseShell);
        }
      }

      function updateEvidenceSummary(turn) {
        const panel = turn.evidencePanel;
        if (!panel) {
          return;
        }

        const sourceCount = panel.tabs.querySelectorAll(".evidence-tab").length;
        const referenceCount = Object.keys(turn.evidenceRegistry.__flat || {}).length;
        panel.title.textContent =
          sourceCount === 1 ? "Evidence · 1 source" : `Evidence · ${sourceCount} sources`;
        panel.hint.textContent = referenceCount
          ? `${referenceCount} linked references`
          : "Open retrieved source findings";
      }

      function ensureEvidencePanel(turn) {
        if (turn.evidencePanel) {
          return turn.evidencePanel;
        }

        const panel = document.createElement("div");
        panel.className = "evidence-panel collapsed";

        const summary = document.createElement("button");
        summary.type = "button";
        summary.className = "evidence-summary";
        summary.setAttribute("aria-expanded", "false");
        const title = document.createElement("div");
        title.className = "evidence-title";
        title.textContent = "Evidence · 0 sources";
        const hint = document.createElement("div");
        hint.className = "evidence-hint";
        hint.textContent = "Open retrieved source findings";
        summary.append(title, hint);
        summary.addEventListener("click", () => {
          panel.classList.toggle("collapsed");
          summary.setAttribute(
            "aria-expanded",
            String(!panel.classList.contains("collapsed")),
          );
        });

        const tabs = document.createElement("div");
        tabs.className = "evidence-tabs";

        const content = document.createElement("div");
        content.className = "evidence-content empty";

        panel.append(summary, tabs, content);
        turn.evidence.appendChild(panel);
        turn.evidencePanel = { panel, summary, title, hint, tabs, content };
        updateEvidenceSummary(turn);
        return turn.evidencePanel;
      }

      function setActiveEvidenceTab(panel, activeButton) {
        const isCollapsing = activeButton.getAttribute("aria-expanded") === "true";

        panel.tabs.querySelectorAll(".evidence-tab").forEach((button) => {
          button.setAttribute("aria-expanded", "false");
        });

        if (isCollapsing) {
          panel.content.classList.add("empty");
          panel.content.innerHTML = "";
          return;
        }

        activeButton.setAttribute("aria-expanded", "true");
        panel.content.classList.remove("empty");
        panel.content.innerHTML = activeButton.evidenceHtml || "";
      }

      function appendSubagent(name, content) {
        const turn = beginAssistantTurn();
        turn.evidence.classList.remove("empty");
        const panel = ensureEvidencePanel(turn);
        const sourceKey = String(name || "source").toLowerCase();
        const sourceLabel = titleCaseSource(name || "source");
        const renderedEvidence = renderEvidencePanelContent(sourceKey, sourceLabel, content);
        let button = Array.from(panel.tabs.querySelectorAll(".evidence-tab")).find(
          (node) => node.dataset.sourceKey === sourceKey,
        );

        if (!button) {
          button = document.createElement("button");
          button.type = "button";
          button.className = "evidence-tab";
          button.dataset.sourceKey = sourceKey;
          button.textContent = sourceLabel;
          button.setAttribute("aria-expanded", "false");
          button.addEventListener("click", () => setActiveEvidenceTab(panel, button));
          panel.tabs.appendChild(button);
        }

        button.evidenceHtml = renderedEvidence;
        turn.hasResearch = true;
        updateEvidenceSummary(turn);
        if (button.getAttribute("aria-expanded") === "true") {
          panel.content.innerHTML = renderedEvidence;
        }
        scrollToBottom();
      }

      function appendChoiceCard(card) {
        const turn = beginAssistantTurn();
        turn.waitingForUser = true;
        turn.main.className = "main-response";
        turn.main.innerHTML = "";

        const wrapper = document.createElement("div");
        wrapper.className = "choice";
        wrapper.dataset.cardId = card.card_id;

        const title = document.createElement("h3");
        title.textContent = card.question;
        const grid = document.createElement("div");
        grid.className = "choice-grid";

        card.options.forEach((option) => {
          const button = document.createElement("button");
          button.type = "button";
          button.innerHTML = `
            <span class="choice-title">${escapeHtml(option.label)}</span>
            ${
              option.description
                ? `<span class="choice-desc">${escapeHtml(option.description)}</span>`
                : ""
            }
          `;
          button.addEventListener("click", () => {
            wrapper.classList.add("selected");
            button.classList.add("selected-option");
            grid.querySelectorAll("button").forEach((node) => {
              node.disabled = true;
            });
            completeChoiceTurn(turn);
            appendMessage("user", "You", option.label);
            activeTurn = null;
            sendPayload({
              type: "ui_selection",
              content: option.label,
              ui_selection: {
                card_id: card.card_id,
                option_id: option.id,
                label: option.label,
                metadata: option.metadata || {},
              },
            });
          });
          grid.appendChild(button);
        });

        wrapper.append(title, grid);
        turn.main.appendChild(wrapper);
        scrollToBottom();
      }

      function sendPayload(payload) {
        if (!ws || ws.readyState !== WebSocket.OPEN) {
          appendMessage("error", "Error", "WebSocket is not connected.");
          return;
        }
        const sourceFilter = getSelectedSourceFilter();
        ws.send(
          JSON.stringify(sourceFilter ? { ...payload, source_filter: sourceFilter } : payload),
        );
      }

      function handleEvent(event) {
        if (event.metadata?.evidence_registry) {
          mergeEvidenceRegistry(beginAssistantTurn(), event.metadata.evidence_registry);
          if (event.metadata?.internal === true) {
            return;
          }
        }

        if (event.type === "final_response_start") {
          startFinalResponse(event.content || {});
        } else if (event.type === "agent") {
          appendAgentChunk(event.content || "");
        } else if (event.type === "agent_status") {
          addTurnStatus(event.name || "Aegis", event.content || "", {
            summary: event.metadata?.summary === true,
            research: true,
          });
        } else if (event.type === "research_status_snapshot") {
          renderResearchStatusSnapshot(event.content || {});
        } else if (event.type === "subagent_start") {
          addTurnStatus(event.name || "Source", event.content || "Started", { research: true });
        } else if (event.type === "subagent") {
          appendSubagent(event.name || "source", event.content || "");
        } else if (event.type === "ui_card") {
          appendChoiceCard(event.content);
        } else if (event.type === "status") {
          connection.textContent = event.content || "";
          if (event.content === "Thinking") {
            addTurnStatus("Aegis", "Thinking");
          } else if (event.content === "Ready") {
            finishAssistantTurn();
          }
        } else if (event.type === "error") {
          appendMessage("error", "Error", event.content || "Unknown error");
          finishAssistantTurn();
        }
      }

      function connect() {
        const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
        ws = new WebSocket(`${protocol}//${window.location.host}/ws`);

        ws.addEventListener("open", () => {
          connection.textContent = "Connected";
        });

        ws.addEventListener("message", (raw) => {
          handleEvent(JSON.parse(raw.data));
        });

        ws.addEventListener("close", () => {
          connection.textContent = "Disconnected";
          setTimeout(connect, 1500);
        });

        ws.addEventListener("error", () => {
          connection.textContent = "Connection error";
        });
      }

      messages.addEventListener("click", (event) => {
        const link = event.target.closest(".evidence-link");
        if (!link) {
          return;
        }

        if (link.getAttribute("href") === "#") {
          event.preventDefault();
        }

        const sourceKey = link.dataset.sourceKey;
        if (!sourceKey) {
          return;
        }

        const turnRoot = link.closest(".assistant-turn");
        const sourceTab = turnRoot?.querySelector(
          `.evidence-tab[data-source-key="${CSS.escape(sourceKey)}"]`,
        );
        if (sourceTab && sourceTab.getAttribute("aria-expanded") !== "true") {
          const panel = sourceTab.closest(".evidence-panel");
          const summary = panel?.querySelector(".evidence-summary");
          if (panel?.classList.contains("collapsed")) {
            panel.classList.remove("collapsed");
            summary?.setAttribute("aria-expanded", "true");
          }
          sourceTab.click();
        }
      });

      composer.addEventListener("submit", (event) => {
        event.preventDefault();
        const content = input.value.trim();
        if (!content) {
          return;
        }
        activeTurn = null;
        currentUserRequest = content;
        appendMessage("user", "You", content);
        beginAssistantTurn();
        sendPayload({ type: "message", content });
        input.value = "";
      });

      input.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          composer.requestSubmit();
        }
      });

      updateSourceFilterState();
      connect();
    </script>
  </body>
</html>
