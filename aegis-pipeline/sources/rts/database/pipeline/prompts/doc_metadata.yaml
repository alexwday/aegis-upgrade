stage: doc_metadata
version: "2.0"
description: >
  Extract source-aware document metadata, a retrieval-ready executive summary,
  table-of-contents evidence, and document structure type.

system_prompt: >
  You are a source-grounded metadata enrichment agent for bank reports to
  shareholders and financial supplements. Use only the supplied document content
  and file metadata. Always use the provided tool.

user_prompt: >
  Extract document metadata for retrieval. Use only facts visible in the
  supplied content or deterministic file metadata. Do not infer missing dates,
  authors, titles, table-of-contents entries, metrics, or management claims.

  Success criteria:

  1. Return a concise title. Prefer a source-derived title when file metadata
     clearly identifies bank, fiscal year, quarter, and source type. Otherwise
     use the most prominent cover-page or first-page heading.

  2. Return authors as the visible publishing organization or author string.
     Use an empty string when no author or publisher is visible.

  3. Return publication_date in ISO 8601 format (YYYY-MM-DD). Use an empty
     string when no specific publication date is visible.

  4. Return language as the ISO 639-1 code for the primary document language.

  5. Choose structure_type from the schema enum:
     sheet_based for XLSX financial supplements where worksheet tabs are the
     durable sections; page_based for RTS PDFs organized mainly by pages;
     chapters for major named or numbered divisions; sections for formal
     section hierarchies; topic_based for clear topic shifts without formal
     numbering; semantic when no reliable structure is identifiable.

  6. Set has_toc to true only when a formal agenda, contents, or table of
     contents is visible. Populate toc_entries only with entries explicitly
     listed in that formal TOC, preserving document order. Do not synthesize a
     TOC from page titles.

  7. Write executive_summary as 2-4 source-grounded sentences describing what
     the document contains for retrieval. Mention the bank, period/source type
     when available, and the main visible themes such as results, segment
     performance, credit, capital, funding, outlook, reconciliations, or
     regulatory schedules. Do not include unsupported interpretation.

  8. Write rationale as a short explanation of the structure_type decision
     with concrete evidence from filetype, data_source, visible pages, sheets,
     or formal TOC.

  Source-specific guidance:

  - For RTS PDFs, treat report sections, MD&A headings, statement titles, note
    titles, table headings, chart headings, legends, footnotes, and appendix
    labels as structure evidence. Do not call the document sheet_based.

  - For financial-supp XLSX files, treat worksheet names, visible sheet titles,
    financial statement schedules, table codes, and row/column organization as
    structure evidence.

  Document content:

  {user_input}

tool_choice: required

tools:
  - type: function
    function:
      name: extract_document_metadata
      description: >
        Return source-grounded document metadata for the enrichment pipeline.
        The output must include the normalized title, author/publisher string,
        publication date, language, structure type, executive summary, TOC
        fields, and structure rationale. Use empty strings or empty arrays when
        evidence is absent instead of inventing values.
      parameters:
        type: object
        properties:
          title:
            type: string
            description: >
              Document title from source metadata or the most prominent visible
              title.
          authors:
            type: string
            description: >
              Authors or publishing organization. Empty string if not found.
          publication_date:
            type: string
            description: >
              Publication date in ISO 8601 format (YYYY-MM-DD). Empty string if
              no exact date is visible.
          language:
            type: string
            description: >
              Primary language as ISO 639-1 code, for example "en" or "fr".
          structure_type:
            type: string
            enum:
              - sheet_based
              - slide_deck
              - page_based
              - chapters
              - sections
              - topic_based
              - semantic
            description: >
              Source-aware document organization. Use sheet_based for XLSX
              worksheets and page_based for RTS/page-oriented PDFs.
          executive_summary:
            type: string
            description: >
              2-4 sentence source-grounded document summary for document-level
              retrieval embeddings.
          has_toc:
            type: boolean
            description: >
              Whether a formal table of contents, contents page, or agenda was
              found in the document.
          toc_entries:
            type: array
            items:
              type: object
              properties:
                name:
                  type: string
                  description: >
                    Title or label of the visible TOC entry.
                page_number:
                  type: integer
                  description: >
                    Page number referenced by the TOC entry. Use 0 only when
                    the entry is visible but no page number is printed.
              required:
                - name
                - page_number
              additionalProperties: false
            description: >
              Formal TOC entries in document order. Return [] when no formal
              TOC exists.
          rationale:
            type: string
            description: >
              Brief evidence-backed explanation of the structure_type decision.
        required:
          - title
          - authors
          - publication_date
          - language
          - structure_type
          - executive_summary
          - has_toc
          - toc_entries
          - rationale
        additionalProperties: false
