[tool.black]
line-length = 88
target-version = ["py313"]
extend-exclude = '''
/(
    venv
  | \.venv
  | data-input
  | database/logs
  | __pycache__
)/
'''

[tool.ruff]
line-length = 88
target-version = "py313"
src = ["database", "retrieval", "tests"]
extend-exclude = [
    "venv",
    ".venv",
    "data-input",
    "database/logs",
    "__pycache__",
]

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
    "UP",
    "B",
    "D100",
    "D101",
    "D102",
    "D103",
    "D104",
    "D105",
    "D106",
    "D107",
]

[tool.pylint.main]
py-version = "3.13"
recursive = true
ignore = ["venv", ".venv", "data-input", "__pycache__", "logs"]
jobs = 1
persistent = false
init-hook = "import sys; sys.path.insert(0, '.')"

[tool.pylint.format]
max-line-length = 88

[tool.pylint.basic]
method-rgx = "(([a-z_][a-z0-9_]{2,30})|(formatTime))$"
const-rgx = "(([A-Z_][A-Z0-9_]*)|(_[a-z][a-z0-9_]*))$"

[tool.pylint.messages_control]
disable = [
    "broad-exception-caught",
    "global-statement",
    "missing-class-docstring",
    "missing-function-docstring",
    "missing-module-docstring",
    "too-many-arguments",
    "too-many-branches",
    "too-many-instance-attributes",
    "too-many-locals",
    "too-many-positional-arguments",
    "too-few-public-methods",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
