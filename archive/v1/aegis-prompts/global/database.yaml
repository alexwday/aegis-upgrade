model: aegis
layer: global
name: database
version: 1.0.0
description: Available database descriptions
system_prompt: "name: database\nversion: \"1.0.0\"\nlast_updated: \"2025-01-22\"\n\ndatabases:\n  - id: transcripts\n    name: Earnings Transcripts Database\n    content: |\n      Data Contains:\n      Earnings call transcripts from all global banks and insurance companies in scope. Contains \n      complete transcripts including prepared management remarks and Q&A sessions with analysts.\n      Used to provide context, management discussion, logic/reasoning/explanation around financial \n      results. While it contains some key line items mentioned during calls, it is primarily meant \n      to capture management discussion and guidance and provide context around the numbers.\n      \n      WHEN TO USE:\n      ✓ Pure management commentary/discussion (\"What did management say about...\")\n      ✓ Forward guidance and outlook\n      ✓ Explanations and reasoning behind numbers\n      ✓ Strategic discussions and initiatives\n      ✓ Q&A with analysts\n      ✓ When questions include \"said\"\
  , \"explained\", \"discussed\", \"mentioned\", \"thoughts on\"\n      \n      DO NOT USE FOR:\n      ✗ Pure line item queries without commentary (use supplementary+RTS instead)\n      ✗ Financial metrics alone (use supplementary+RTS)\n      ✗ Report to shareholders content (use RTS)\n      ✗ Pre-generated reports (use reports database)\n      \n      Query Requirements:\n      - Fiscal Year (e.g., FY2024, FY2025)\n      - Quarter (e.g., Q1, Q2, Q3, Q4) OR multiple periods\n      - Bank(s) (e.g., RBC, TD, BMO, Scotia, CIBC, or \"all peers\")\n      \n      Example Queries:\n      - \"What did RBC management say about digital transformation?\" (transcripts ONLY)\n      - \"How did the CEO explain the margin compression?\" (transcripts for commentary)\n      - \"What guidance was provided for 2025?\" (transcripts ONLY)\n      \n      Institution Coverage:\n      Available for: All global banks and insurance companies in scope\n\n  - id: event_transcripts\n    name: Event Transcripts Database\n\
  \    content: |\n      Data Contains:\n      Conference, analyst-day, investor-day, and other non-earnings event transcripts for\n      banks in scope. Unlike the earnings transcripts database, this source can contain\n      multiple event transcript XMLs for the same bank, fiscal year, and quarter.\n\n      WHEN TO USE:\n      ✓ Questions about management commentary from conferences or analyst events\n      ✓ Investor day, analyst day, fireside chat, or non-earnings call discussion\n      ✓ Cross-event retrieval when the user asks what was said across event transcripts\n      ✓ Follow-up context that may not appear in the quarterly earnings call\n\n      DO NOT USE FOR:\n      ✗ The canonical quarterly earnings call transcript only (use transcripts)\n      ✗ Pure line item queries without commentary (use supplementary+RTS instead)\n      ✗ Report to shareholders content (use RTS)\n\n      Query Requirements:\n      - Fiscal Year (e.g., FY2024, FY2025)\n      - Quarter (e.g., Q1, Q2, Q3,\
  \ Q4)\n      - Bank(s) (e.g., RBC, TD, BMO, Scotia, CIBC)\n\n      Example Queries:\n      - \"What did RBC say at analyst conferences in Q1 2026?\" (event_transcripts)\n      - \"Summarize Scotiabank event transcript commentary on credit quality\" (event_transcripts)\n      - \"Compare conference commentary across RBC and TD\" (event_transcripts)\n\n      Institution Coverage:\n      Available for banks and periods with loaded event transcript XMLs\n\n  - id: supplementary\n    name: Supplementary Information Database\n    content: |\n      Data Contains:\n      Income statement, balance sheet, and business-specific line items from all major Canadian \n      and US banks in scope. This is the primary source of line items, amounts, and historical \n      financial data. Contains standardized financial metrics to enable direct comparisons across \n      institutions.\n      \n      WHEN TO USE:\n      ✓ ANY financial line item query (net income, revenue, NIM, ROE, efficiency ratio, etc.)\n\
  \      ✓ Peer comparisons and rankings\n      ✓ Trend analysis of metrics\n      ✓ Segment/platform performance data\n      ✓ ALWAYS pair with RTS for comprehensive line item coverage\n      ✓ Regulatory metrics (CET1, RWA, leverage ratios)\n      \n      DO NOT USE FOR:\n      ✗ Pure management commentary (use transcripts instead)\n      ✗ Standalone without RTS for line items (always use BOTH)\n      ✗ 10-Q/10-K document content (use RTS)\n      ✗ Pre-generated analysis reports (use reports database)\n      \n      CRITICAL RULE:\n      ⚠️ ALWAYS use supplementary AND rts TOGETHER for line item queries\n      ⚠️ NEVER use supplementary alone for line items\n      \n      Query Requirements:\n      - Fiscal Year (e.g., FY2024, FY2025)\n      - Quarter (e.g., Q1, Q2, Q3, Q4) OR multiple periods\n      - Bank(s) (e.g., RBC, TD, BMO, Scotia, CIBC, or \"peer average\")\n      \n      Example Queries:\n      - \"What's the efficiency ratio?\" (use supplementary + RTS)\n      - \"Show NIM trends\"\
  \ (use supplementary + RTS)\n      - \"Compare net income across banks\" (use supplementary + RTS)\n      \n      Institution Coverage:\n      Available for: All major Canadian and US banks in scope\n\n  - id: supplementary_financials\n    name: Supplementary Financials Database\n    content: |\n      Data Contains:\n      Placeholder supplementary financials agent for the new database buildout. This is currently\n      used to test routing and streaming before the actual retriever and research logic are built.\n\n      WHEN TO USE:\n      ✓ When the user explicitly selects Supplementary Financials in the interface\n      ✓ Testing the new supplementary_financials subagent path\n      ✓ Future supplementary financial package retrieval and research workflows\n\n      DO NOT USE FOR:\n      ✗ IR benchmarking output from the existing supplementary subagent\n      ✗ Management commentary (use transcripts instead)\n      ✗ Report to shareholders or 10-Q/10-K document content (use RTS)\n\n \
  \     Query Requirements:\n      - Fiscal Year (e.g., FY2024, FY2025)\n      - Quarter (e.g., Q1, Q2, Q3, Q4)\n      - Bank(s) (e.g., RBC, TD, BMO, Scotia, CIBC)\n\n      Institution Coverage:\n      Placeholder coverage while the actual retriever is being built\n\n  - id: pillar3\n    name: Pillar 3 Regulatory Database\n    content: |\n      Data Contains:\n      Quarterly Pillar 3 reporting from Canadian banks. Contains Basel III regulatory disclosures\n      including detailed capital adequacy metrics, risk-weighted assets by category, leverage\n      ratios, liquidity coverage ratios (LCR), net stable funding ratios (NSFR), and other\n      regulatory compliance metrics required by OSFI.\n\n      WHEN TO USE:\n      ✓ CET1, Tier 1, Total Capital ratios\n      ✓ Risk-weighted assets (RWA) details\n      ✓ Leverage ratios\n      ✓ Liquidity metrics (LCR, NSFR)\n      ✓ Basel III regulatory metrics\n      ✓ Regulatory capital disclosures\n\n      DO NOT USE FOR:\n      ✗ Non-regulatory\
  \ metrics (use supplementary+RTS)\n      ✗ Management commentary (use transcripts)\n      ✗ US banks (Canadian banks only)\n      ✗ General financial metrics (use supplementary+RTS)\n\n      Query Requirements:\n      - Fiscal Year (e.g., FY2024, FY2025)\n      - Quarter (e.g., Q1, Q2, Q3, Q4)\n      - Bank(s) (e.g., RBC, TD, BMO, Scotia, CIBC)\n\n      Example Queries:\n      - \"What is RBC's detailed CET1 composition?\" (use pillar3)\n      - \"Show regulatory capital breakdown\" (use pillar3)\n      - \"LCR and NSFR trends\" (use pillar3)\n\n      Institution Coverage:\n      Available for: Canadian banks only\n\n  - id: reports\n    name: Pre-Generated Reports Database\n    content: |\n      Data Contains:\n      ONLY the following specific pre-generated reports (no other data):\n      1. Transcript Call Summaries - Pre-computed earnings call summaries\n      2. Transcript Key Themes - Pre-identified key themes from earnings calls\n      3. Transcripts CM Readthrough - Capital Markets\
  \ division analysis reports\n      4. Transcripts WM Readthrough - Wealth Management division analysis reports\n      5. RTS Blackline - Report to Shareholders change comparison reports\n      \n      WHEN TO USE:\n      ✓ ONLY when user explicitly requests one of the above reports BY NAME\n      ✓ \"transcript call summary\" or \"call summary\"\n      ✓ \"key themes\" (as a report name)\n      ✓ \"CM readthrough\" or \"Capital Markets readthrough\"\n      ✓ \"WM readthrough\" or \"Wealth Management readthrough\"\n      ✓ \"RTS blackline\" or \"blackline comparison\"\n      \n      DO NOT USE FOR:\n      ✗ \"report to shareholders\" (use RTS - completely different!)\n      ✗ \"10-Q\" or \"10-K\" reports (use RTS)\n      ✗ Any line item queries (use supplementary+RTS)\n      ✗ Management commentary queries (use transcripts)\n      ✗ General earnings information (use appropriate database)\n      ✗ ANY query that doesn't explicitly name one of the 5 reports above\n      \n      CRITICAL:\n\
  \      ⚠️ This is ONLY for pre-generated analysis reports\n      ⚠️ NOT for source documents like \"report to shareholders\"\n      ⚠️ User must explicitly request the report BY NAME\n      \n      Query Requirements:\n      - Specific report name from the list above\n      - Fiscal Year (e.g., FY2024, FY2025)\n      - Quarter (e.g., Q1, Q2, Q3, Q4)\n      - Bank(s) (e.g., RBC, TD, BMO, Scotia, CIBC)\n      \n      Institution Coverage:\n      Available for: Banks with pre-generated reports in the system\n\n  - id: rts\n    name: Report to Shareholders Database\n    content: |\n      Data Contains:\n      Report to Shareholders for Canadian banks and 10-Q (quarterly) / 10-K (annual) filings from US banks. \n      This is the ONLY database containing 10-Q and 10-K reports. Contains comprehensive financial \n      statements, MD&A, business segment analysis at platform level, and regulatory disclosures. \n      Provides both narrative sections and tabular financial data in the format required\
  \ by each jurisdiction.\n      \n      WHEN TO USE:\n      ✓ ALWAYS for ANY line item query (paired with supplementary)\n      ✓ When user specifically asks for \"report to shareholders\"\n      ✓ 10-Q or 10-K filings (EXCLUSIVE to RTS)\n      ✓ Quarterly/annual report documents\n      ✓ Segment/platform performance data\n      ✓ Official filed financial statements\n      \n      DO NOT USE FOR:\n      ✗ Pure management commentary without line items (use transcripts)\n      ✗ Pre-generated analysis reports (use reports database)\n      ✗ Standalone without supplementary for line items\n      \n      CRITICAL RULES:\n      ⚠️ For line items: ALWAYS use supplementary AND rts TOGETHER\n      ⚠️ For \"report to shareholders\"/\"10-Q\"/\"10-K\": use RTS ONLY\n      ⚠️ This is the ONLY source for 10-Q/10-K documents\n      ⚠️ Do NOT confuse with \"reports\" database (completely different)\n      \n      Query Requirements:\n      - Fiscal Year (e.g., FY2024, FY2025)\n      - Quarter (e.g., Q1,\
  \ Q2, Q3, Q4) OR Annual\n      - Bank(s) (e.g., RBC, TD, BMO, Scotia, CIBC, JPM, BAC, WFC)\n      \n      Example Queries:\n      - \"What's the net income?\" (use supplementary + RTS)\n      - \"Get the report to shareholders\" (use RTS only)\n      - \"Show JPMorgan's 10-Q\" (use RTS only)\n      - \"Segment revenue breakdown\" (use supplementary + RTS)\n      \n      Institution Coverage:\n      Available for: Canadian banks and US banks in scope\n"
